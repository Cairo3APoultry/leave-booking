  // ════════════════ طبقة الاتصال بـ Supabase REST (async) ════════════
  async function sb(method, path, payload, extraHeaders) {
    var url = SUPABASE_URL + '/rest/v1/' + path;
    var headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };
    if (extraHeaders) for (var k in extraHeaders) headers[k] = extraHeaders[k];
    var opts = { method: method, headers: headers };
    if (payload !== undefined && payload !== null) opts.body = JSON.stringify(payload);
    var res = await fetch(url, opts);
    var text = await res.text();
    if (res.status >= 200 && res.status < 300) return text ? JSON.parse(text) : [];
    throw new Error('DB ' + res.status + ': ' + text);
  }
  function sbGet(path) { return sb('GET', path); }
  function sbInsert(table, obj) { return sb('POST', table, obj); }
  function sbPatch(table, q, obj) { return sb('PATCH', table + '?' + q, obj); }
  function sbDelete(table, q) { return sb('DELETE', table + '?' + q); }

  // جلب كل الصفوف بتجاوز حد الـ 1000
  async function sbGetAll(path) {
    var page = 1000, offset = 0, all = [], guard = 0;
    while (guard < 500) {
      var sep = path.indexOf('?') > -1 ? '&' : '?';
      var chunk = await sbGet(path + sep + 'limit=' + page + '&offset=' + offset);
      if (!chunk || !chunk.length) break;
      all = all.concat(chunk);
      if (chunk.length < page) break;
      offset += page; guard++;
    }
    return all;
  }

  // ════════════════ رسائل الأخطاء بالعربي ════════════════════════════
  function friendlyError(e) {
    var raw = String(e && e.message ? e.message : e);
    var pgCode = '', details = '';
    var m = raw.match(/DB\s+\d+:\s*(\{[\s\S]*\})/);
    if (m) { try { var j = JSON.parse(m[1]); pgCode = j.code || ''; details = j.details || ''; } catch (_) {} }
    if (pgCode === '23505' || /duplicate key/i.test(raw)) {
      var k = details.match(/Key\s*\(([^)]+)\)=\(([^)]+)\)/);
      var col = k ? k[1] : '', val = k ? k[2] : '';
      var names = { 'username': 'اسم المستخدم', 'code': 'كود الموظف', 'route_id': 'خط السير',
        'sector_id, year, month': 'ميزانية هذا القطاع لنفس الشهر والسنة' };
      var label = names[col] || 'هذه القيمة';
      return val ? (label + ' «' + val + '» مُسجَّل بالفعل، لا يمكن تكراره.')
                 : (label + ' مُسجَّل بالفعل، لا يمكن تكراره.');
    }
    if (pgCode === '23503' || /foreign key/i.test(raw)) {
      if (/sector/i.test(details)) return 'القطاع المحدد غير موجود. برجاء اختيار قطاع صحيح أو إضافته أولاً.';
      return 'يوجد ارتباط ببيانات غير موجودة. برجاء مراجعة الاختيارات.';
    }
    if (pgCode === '23P01' || /exclusion/i.test(raw)) return 'يوجد حجز مسبق متداخل في نفس الفترة لهذا الموظف.';
    if (pgCode === '23502') return 'يوجد حقل مطلوب فارغ، برجاء تعبئة جميع البيانات الأساسية.';
    if (/timed out|timeout|DNS|Failed to fetch|NetworkError/i.test(raw)) return 'تعذّر الاتصال بقاعدة البيانات، برجاء المحاولة مرة أخرى بعد قليل.';
    if (/DB\s+5\d\d/.test(raw)) return 'حدث خطأ مؤقت في الخادم، برجاء المحاولة بعد قليل.';
    if (/DB\s+401|DB\s+403/.test(raw)) return 'مشكلة في صلاحية الاتصال بقاعدة البيانات. برجاء مراجعة المفتاح وإعدادات RLS.';
    return 'حدث خطأ غير متوقع. برجاء المحاولة مرة أخرى.';
  }

  // ════════════════ مساعدات التواريخ ════════════════════════════════
  function fmtDate(d) {
    if (!d) return '';
    var s = String(d).trim();
    return s.slice(0, 10);
  }
  function todayStr() {
    var n = new Date();
    return n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0') + '-' + String(n.getDate()).padStart(2, '0');
  }
  function daysBetween(a, b) {
    try {
      var da = new Date(String(a).slice(0, 10) + 'T12:00:00');
      var db = new Date(String(b).slice(0, 10) + 'T12:00:00');
      return Math.max(1, Math.ceil((db - da) / 86400000));
    } catch (e) { return 1; }
  }
  function arr(v) { return Array.isArray(v) ? v : (v ? [v] : []); }

  // ════════════════ app_settings (بديل PropertiesService) ════════════
  async function settingGet(key, def) {
    try {
      var r = await sbGet('app_settings?key=eq.' + encodeURIComponent(key) + '&select=value');
      return r.length ? r[0].value : def;
    } catch (e) { return def; }
  }
  async function settingSet(key, value) {

  }

  // ════════════════ AUTH & GET ALL ═══════════════════════════════════
  async function login(username, password) {
    try {
      var rows = await sbGet('users?username=eq.' + encodeURIComponent(username) + '&password=eq.' + encodeURIComponent(password) + '&select=*');

      }
      return { success: false, message: 'اسم المستخدم أو كلمة المرور غير صحيحة' };
    } catch (e) { return { success: false, message: friendlyError(e) }; }

      return {
        success: true, sectors: results[0], employees: results[1], routes: results[2],
        vehicleTypes: results[3], vehRoutes: results[4], bookings: results[5], trips: results[6],

      };

  // ════════════════ TICKET PRICES ════════════════════════════════════
  async function saveTicketPrice(data) {
    try {
      await sb('POST', 'ticket_prices?on_conflict=route_id',
        { route_id: +data.routeId, route_name: data.routeName || '', ticket_cost: +data.ticketCost || 0, notes: data.notes || '', updated_at: todayStr() },
        { 'Prefer': 'resolution=merge-duplicates,return=representation' });
      return { success: true };
    } catch (e) { return { success: false, message: friendlyError(e) }; }
  }
  async function getTicketCostForRoute(routeId) {
    var f = (await getTicketPrices()).find(function (p) { return p.routeId === +routeId; });
    return f ? f.ticketCost : 0;
  }

  // ════════════════ VEHICLE PRICING ══════════════════════════════════
  async function getVehicleCostForRoute(vehicleTypeId, routeId) {
    var vr = await getVehRoutes();
    var ex = vr.find(function (r) { return r.vehicleTypeId === +vehicleTypeId && r.routeId === +routeId; });
    if (ex) return ex.dailyCost;
    var df = vr.find(function (r) { return r.vehicleTypeId === +vehicleTypeId && r.routeId === 0; });
    if (df) return df.dailyCost;
    var vt = (await getVehicleTypes()).find(function (v) { return v.id === +vehicleTypeId; });
    return vt ? vt.dailyCost : 0;
  }
  async function addPriceHistoryEntry(vehicleId, vehicleName, routeId, routeName, date, cost, note) {
    await sbInsert('price_history', { vehicle_id: +vehicleId, vehicle_name: vehicleName, route_id: +routeId, route_name: routeName || '', date: date, cost: +cost, note: note || '' });
  }
  async function addVehRoute(data) {
    try {
      var row = await sbInsert('veh_routes', { vehicle_type_id: +data.vehicleTypeId, vehicle_name: data.vehicleName, route_id: +data.routeId, route_name: data.routeName || '', daily_cost: +data.dailyCost });
      await addPriceHistoryEntry(+data.vehicleTypeId, data.vehicleName, +data.routeId, data.routeName || '', todayStr(), +data.dailyCost, 'تسعيرة جديدة');
      return { success: true, id: row[0] ? row[0].id : null };
    } catch (e) { return { success: false, message: friendlyError(e) }; }
  }
  async function deleteVehRoute(id) {
    try { await sbDelete('veh_routes', 'id=eq.' + (+id)); return { success: true }; }
    catch (e) { return { success: false, message: friendlyError(e) }; }
  }
  async function updateVehiclePrice(vehicleId, vehicleName, routeId, routeName, newCost, date, note) {
    try {
      var ex = await sbGet('veh_routes?vehicle_type_id=eq.' + (+vehicleId) + '&route_id=eq.' + (+routeId) + '&select=id');
      if (ex.length) await sbPatch('veh_routes', 'id=eq.' + (+ex[0].id), { daily_cost: +newCost });
      else await sbInsert('veh_routes', { vehicle_type_id: +vehicleId, vehicle_name: vehicleName, route_id: +routeId, route_name: routeName || '', daily_cost: +newCost });
      await addPriceHistoryEntry(+vehicleId, vehicleName, +routeId, routeName || '', date || todayStr(), +newCost, note || '');
      return { success: true };
    } catch (e) { return { success: false, message: friendlyError(e) }; }
  }

  // ════════════════ SECTORS ══════════════════════════════════════════
  async function addSector(data) {
    try { await sbInsert('sectors', { name: data.name, color: data.color || '#c8102e', bg: data.bg || '#fff1f2', ico: data.ico || '🏢', depts: data.depts || [] }); return { success: true }; }
    catch (e) { return { success: false, message: friendlyError(e) }; }
  }
  async function updateSector(data) {
    try { await sbPatch('sectors', 'id=eq.' + (+data.id), { name: data.name, color: data.color || '#c8102e', bg: data.bg || '#fff1f2', ico: data.ico || '🏢', depts: data.depts || [] }); return { success: true }; }
    catch (e) { return { success: false, message: friendlyError(e) }; }
  }
  async function deleteSector(id) {
    try { await sbDelete('sectors', 'id=eq.' + (+id)); return { success: true }; }
    catch (e) { return { success: false, message: friendlyError(e) }; }
  }

  // ════════════════ EMPLOYEES ════════════════════════════════════════
  async function addEmployee(data) {
    try {
      var code = String(data.code || '').trim();
      var ex = await sbGet('employees?code=eq.' + encodeURIComponent(code) + '&select=code');
      if (ex.length) return { success: false, message: 'كود الموظف موجود مسبقاً' };
      await sbInsert('employees', { code: code, name: data.name, job: data.job, sector_id: +data.sectorId, dept: data.dept, can_choose_sector: data.canChooseSector === true });
      return { success: true };
    } catch (e) { return { success: false, message: friendlyError(e) }; }
  }
  async function updateEmployee(data) {
    try {
      var code = String(data.code || '').trim();
      var r = await sbPatch('employees', 'code=eq.' + encodeURIComponent(code), { name: data.name, job: data.job, sector_id: +data.sectorId, dept: data.dept, can_choose_sector: data.canChooseSector === true });
      if (!r.length) return { success: false, message: 'الموظف غير موجود' };
      return { success: true };
    } catch (e) { return { success: false, message: friendlyError(e) }; }
  }
  async function deleteEmployee(code) {
    try { await sbDelete('employees', 'code=eq.' + encodeURIComponent(String(code || '').trim())); return { success: true }; }
    catch (e) { return { success: false, message: friendlyError(e) }; }
  }
  async function importEmployees(dataArr) {
    try {
      var existing = {};
      (await sbGetAll('employees?select=code&order=code')).forEach(function (r) { existing[String(r.code)] = true; });
      var toInsert = [];
      dataArr.forEach(function (d) {
        var code = String(d.code || '').trim();
        if (code && !existing[code]) {
          var ccs = d.canChooseSector;
          var canChoose = (ccs === true || ccs === 1 || ['true', '1', 'yes', 'نعم', 'صح', 'y'].indexOf(String(ccs).trim().toLowerCase()) > -1);
          toInsert.push({ code: code, name: d.name || '', job: d.job || '', sector_id: +d.sectorId || 1, dept: d.dept || '', can_choose_sector: canChoose });
          existing[code] = true;
        }
      });
      if (toInsert.length) await sbInsert('employees', toInsert);
      return { success: true, added: toInsert.length };
    } catch (e) { return { success: false, message: friendlyError(e) }; }
  }

  // ════════════════ ROUTES ═══════════════════════════════════════════
  async function addRoute(data) {
    try { var row = await sbInsert('routes', { name: data.name, from_city: data.from, to_city: data.to }); return { success: true, id: row[0] ? row[0].id : null }; }
    catch (e) { return { success: false, message: friendlyError(e) }; }
  }
  async function updateRoute(data) {
    try { await sbPatch('routes', 'id=eq.' + (+data.id), { name: data.name, from_city: data.from, to_city: data.to }); return { success: true }; }
    catch (e) { return { success: false, message: friendlyError(e) }; }
  }
  async function deleteRoute(id) {
    try { await sbDelete('routes', 'id=eq.' + (+id)); return { success: true }; }
    catch (e) { return { success: false, message: friendlyError(e) }; }
  }

  // ════════════════ VEHICLES ═════════════════════════════════════════
  async function addVehicle(data) {
    try {
      var row = await sbInsert('vehicle_types', { name: data.name, capacity: +data.capacity, default_daily_cost: +data.dailyCost, icon: data.icon || '🚗' });
      var id = row[0] ? row[0].id : null;

  async function updateVehicle(data) {
    try { await sbPatch('vehicle_types', 'id=eq.' + (+data.id), { name: data.name, capacity: +data.capacity, default_daily_cost: +data.dailyCost, icon: data.icon || '🚗' }); return { success: true }; }
    catch (e) { return { success: false, message: friendlyError(e) }; }
  }
  async function deleteVehicle(id) {
    try { await sbDelete('vehicle_types', 'id=eq.' + (+id)); return { success: true }; }
    catch (e) { return { success: false, message: friendlyError(e) }; }
  }

  // ════════════════ BOOKINGS ═════════════════════════════════════════
  async function addBooking(data) {
    try {
      var empCode = String(data.empCode || '').trim();
      var res = await sb('POST', 'rpc/add_booking', {
        p_emp_code: empCode, p_route_id: +data.routeId,
        p_depart: data.departDate, p_return: data.returnDate,
        p_submitted_by: data.submittedBy || empCode, p_return_route_id: +data.routeId
      });
      var row = Array.isArray(res) ? res[0] : res;
      return { success: true, id: row.id, ref: row.ref };
    } catch (e) {
      var msg = String(e.message || e);
      if (msg.indexOf('23P01') > -1 || msg.indexOf('no_overlap') > -1 || msg.toLowerCase().indexOf('exclusion') > -1)

  async function saveTrip(data) {

      var numVeh = +data.numVehicles || 1, numVeh2 = +data.numVehicles2 || 0, veh2Id = +data.veh2TypeId || 0;
      var neCar = empCodes.length || 1, neTk = tkEmps.length || 0;

        vehTotal = c1 * numVeh + c2 * numVeh2;
        cpe = neCar > 0 ? Math.round(vehTotal / neCar) : 0;

        ticket_employees: tkEmps, ticket_cost_per_emp: tkCPE, ticket_total_cost: tkTotal,
        assigned_by: data.assignedBy || '', extra_sector_ids: extra, trip_type: data.tripType || 'depart'

.b-g{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0;}
.b-y{background:#fef3c7;color:#b45309;border:1px solid #fde68a;}
.b-r{background:#fee2e2;color:#dc2626;border:1px solid #fecaca;}
.b-b{background:var(--RL);color:var(--R);border:1px solid #fecdd3;}
.b-gr{background:#f1f5f9;color:var(--txt3);border:1px solid var(--bdr);}
.b-pu{background:#f5f3ff;color:var(--purple);border:1px solid #ddd6fe;}
.b-tk{background:#fdf4ff;color:#7c3aed;border:1px solid #e9d5ff;}
.b-car{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa;}
.b-rt-change{background:#fef3c7;color:#92400e;border:1px solid #fde68a;}
.chip{display:inline-flex;align-items:center;background:var(--RL);border:1px solid #fecdd3;color:var(--R);border-radius:7px;padding:2px 9px;font-size:11px;font-weight:700;}
.divider{height:1px;background:var(--bdr);margin:14px 0;}
.slbl{font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.empty{text-align:center;padding:34px;color:var(--txt3);font-size:13px;}
.prog-bar{background:#e2e8f0;border-radius:99px;height:6px;overflow:hidden;}
.prog{height:100%;border-radius:99px;transition:width .5s;}
.chart-wrap{position:relative;width:100%;padding:10px;}
.chart-h180{height:200px;}.chart-h200{height:210px;}.chart-h220{height:230px;}.chart-h250{height:270px;}
.srow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.sbox{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;padding:6px 12px;}
.sbox input{background:none;border:none;font-size:12px;color:var(--txt);outline:none;direction:rtl;font-family:inherit;}
select.flt{background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;padding:6px 12px;font-size:12px;color:var(--txt);outline:none;cursor:pointer;font-family:inherit;}
.tabs-r{display:flex;gap:3px;background:var(--bg);border-radius:9px;padding:3px;border:1px solid var(--bdr);}
.tab-b{padding:6px 14px;border-radius:7px;font-size:11.5px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--txt2);transition:all .15s;font-family:inherit;}
.tab-b.active{background:var(--R);color:#fff;box-shadow:0 2px 8px rgba(200,16,46,.3);}
.fbar{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:13px 17px;display:flex;align-items:flex-end;gap:13px;margin-bottom:15px;flex-wrap:wrap;box-shadow:var(--sh);}
.fbar label{font-size:10px;font-weight:700;color:var(--txt3);display:block;margin-bottom:4px;text-transform:uppercase;}
.fbar input,.fbar select{background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;padding:7px 12px;font-size:12px;color:var(--txt);outline:none;font-family:inherit;}
.fbar input[type=date],.fbar input[type=month]{direction:ltr;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:11.5px;font-weight:700;color:var(--txt2);}
.fg input,.fg select,.fg textarea{background:var(--bg);border:1.5px solid var(--bdr);border-radius:11px;padding:9px 13px;font-size:13px;color:var(--txt);outline:none;transition:all .15s;width:100%;font-family:inherit;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--R);box-shadow:0 0 0 3px rgba(200,16,46,.1);}
.fg input:disabled{opacity:.5;cursor:not-allowed;}
.fg.full{grid-column:1/-1;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px;}
.ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(5px);z-index:999;align-items:center;justify-content:center;}
.ov.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--bdr);border-radius:22px;width:620px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:var(--shl);animation:slideUp .2s ease;}
.mh{padding:17px 24px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:#fafbfc;border-radius:22px 22px 0 0;position:sticky;top:0;z-index:1;}
.mt{font-size:15.5px;font-weight:900;}
.mcl{background:var(--bg);border:1px solid var(--bdr);color:var(--txt3);width:31px;height:31px;border-radius:9px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.mcl:hover{background:#fee2e2;color:#dc2626;}
.mb{padding:22px 24px;}
.mf{padding:14px 24px;border-top:1px solid var(--bdr);display:flex;gap:9px;justify-content:flex-end;background:#fafbfc;border-radius:0 0 22px 22px;}
.al{border-radius:10px;padding:11px 15px;font-size:12.5px;margin-bottom:13px;display:flex;gap:9px;}
.al-r{background:var(--RL);border:1px solid #fecdd3;color:var(--R);}
.al-g{background:#f0fdf4;border:1px solid #bbf7d0;color:var(--green);}
.al-y{background:#fef3c7;border:1px solid #fde68a;color:var(--amber);}
.al-b{background:#eff6ff;border:1px solid #bfdbfe;color:var(--blue);}
.al-pu{background:#f5f3ff;border:1px solid #ddd6fe;color:var(--purple);}
.bcard{border:2px solid var(--R);border-radius:16px;padding:22px;background:#fff;}
.bcard-ref{font-family:monospace;font-size:20px;font-weight:900;color:var(--R);letter-spacing:2px;margin-bottom:5px;}
.bcard-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bdr2);font-size:12.5px;}
.bcard-row:last-child{border:none;}
.trip-group-card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;margin-bottom:14px;box-shadow:var(--sh);overflow:hidden;}
.tg-header{padding:14px 18px;background:#fafbfc;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.tg-route{font-weight:900;font-size:15px;color:var(--txt);}
.tg-meta{font-size:11px;color:var(--txt3);margin-top:3px;}
.tg-body{padding:14px 18px;}
.emp-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;margin-bottom:5px;border:1px solid var(--bdr2);background:var(--bg);}
.emp-row:last-child{margin-bottom:0;}
.emp-code{font-family:monospace;font-size:11.5px;color:var(--R);font-weight:800;min-width:44px;}
.emp-name{font-weight:700;font-size:13px;flex:1;}
.transport-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.tb-car{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa;}
.tb-tk{background:#fdf4ff;color:#7c3aed;border:1px solid #e9d5ff;}
.tg-footer{padding:12px 18px;border-top:1px solid var(--bdr);background:linear-gradient(to right,#fafbfc,var(--RL));display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.mod-emp-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:10px;border:1.5px solid var(--bdr);margin-bottom:6px;transition:all .15s;}
.mod-emp-row.mode-car{border-color:#ea580c;background:#fff7ed;}
.mod-emp-row.mode-tk{border-color:#7c3aed;background:#fdf4ff;}
.toggle-btn-group{display:flex;border-radius:8px;overflow:hidden;border:1.5px solid var(--bdr);}
.tgl-btn{padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:var(--bg);color:var(--txt3);transition:all .15s;font-family:inherit;}
.tgl-btn.active-car{background:#ea580c;color:#fff;}
.tgl-btn.active-tk{background:#7c3aed;color:#fff;}
#emp-page{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(145deg,#fef2f2,#f8fafc,#fff7f0);padding:20px;}
#emp-page.show{display:flex;}
.emp-tbar{position:fixed;top:0;left:0;right:0;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;background:var(--card);border-bottom:1px solid var(--bdr);box-shadow:var(--sh);z-index:10;}
.emp-card{background:var(--card);border:1px solid var(--bdr);border-radius:22px;padding:28px;width:100%;max-width:570px;box-shadow:var(--shl);margin-top:72px;}
.info-grid{background:var(--bg);border:1px solid var(--bdr);border-radius:13px;padding:14px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.ir .il{font-size:10px;color:var(--txt3);font-weight:700;text-transform:uppercase;}
.ir .iv{font-size:13.5px;font-weight:700;margin-top:3px;}
.ndot{position:relative;}
.ndot::after{content:attr(data-count);position:absolute;top:-5px;left:-5px;background:#dc2626;color:#fff;font-size:9px;font-weight:900;min-width:17px;height:17px;border-radius:99px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;padding:0 3px;}
.rtrip-row{background:var(--bg);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.rtrip-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
.reply-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:9px;padding:10px 14px;margin-top:10px;font-size:12px;}
.lding{display:none;position:fixed;inset:0;background:rgba(255,255,255,.75);backdrop-filter:blur(3px);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:13px;}
.lding.show{display:flex;}
.spin{width:42px;height:42px;border:3px solid var(--bdr);border-top:3px solid var(--R);border-radius:50%;animation:spin .65s linear infinite;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:13px 24px;border-radius:13px;font-size:13px;font-weight:600;z-index:10000;transition:all .3s;opacity:0;pointer-events:none;min-width:220px;text-align:center;white-space:nowrap;}
.toast.show{opacity:1;}.toast.success{background:#15803d;}.toast.error{background:#dc2626;}
.rt-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;width:140px;height:110px;border-radius:16px;cursor:pointer;border:2px solid var(--bdr);transition:all .2s;background:var(--bg);gap:8px;}
.rt-btn:hover{transform:scale(1.04);}
.rt-btn.sat{border-color:var(--green);background:#f0fdf4;}
.rt-btn.unsat{border-color:#dc2626;background:#fee2e2;}
.vc{background:var(--bg);border:2px solid var(--bdr);border-radius:13px;padding:14px;cursor:pointer;transition:all .18s;text-align:center;}
.vc:hover{border-color:#fca5a5;background:var(--RL);}
.vc.sel{border-color:var(--R);background:var(--RL);box-shadow:0 0 0 3px rgba(200,16,46,.15);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media print{
  @page{size:A4 landscape;margin:10mm 12mm;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;}
  /* إخفاء عناصر التنقل والأدوات */
  .sidebar,.topbar,.sb-foot,.lding,.toast,.ov,
  .no-print,.fbar .btn,.fbar button,.srow,.ch .btn,
  .ch button,.ch .srow{display:none!important;}
  /* تخطيط الصفحة */
  body{background:#fff!important;margin:0!important;padding:0!important;}
  .main{margin-right:0!important;width:100%!important;padding:0!important;}
  .content{padding:6px!important;}
  /* رأس الطباعة */
  .main::before{
    content:'Cairo 3A Poultry — نظام إدارة إجازات الأسطول';
    display:block;font-size:11px;font-weight:700;color:#c8102e;
    border-bottom:2px solid #c8102e;padding-bottom:5px;margin-bottom:10px;
  }
  /* البطاقات */
  .card,.mc,.stat{
    break-inside:avoid!important;page-break-inside:avoid!important;
    box-shadow:none!important;border:1px solid #d1d5db!important;
    margin-bottom:8px!important;border-radius:6px!important;
  }
  /* الشبكات */
  .g4{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:6px!important;}
  .g3{display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:6px!important;}
  .g2{display:grid!important;grid-template-columns:1fr 1fr!important;gap:6px!important;}
  /* إحصائيات */
  .stat{padding:8px!important;text-align:center!important;}
  .st-ico{width:32px!important;height:32px!important;font-size:14px!important;}
  .st-n{font-size:14px!important;}
  .st-l{font-size:9px!important;}
  .st-s{font-size:8px!important;}
  /* شريط الفلترة — عرضه بشكل نص */
  .fbar{
    display:flex!important;flex-wrap:wrap!important;gap:4px!important;
    background:#f8fafc!important;border:1px solid #e2e8f0!important;
    padding:5px 8px!important;border-radius:6px!important;
    margin-bottom:8px!important;font-size:9px!important;
  }
  .fbar input,.fbar select{
    border:none!important;background:transparent!important;
    font-weight:700!important;padding:1px 3px!important;font-size:9px!important;
    color:#1e293b!important;
  }
  .fbar label{font-size:8px!important;color:#64748b!important;}
  /* الجداول */
  .tbl{overflow:visible!important;}
  table{font-size:8.5px!important;width:100%!important;border-collapse:collapse!important;}
  th{
    background:#c8102e!important;color:#fff!important;
    padding:4px 6px!important;font-size:8.5px!important;
  }
  td{padding:3px 6px!important;border-bottom:1px solid #f0f0f0!important;}
  tr:nth-child(even) td{background:#f9fafb!important;}
  /* رأس وجسم البطاقات */
  .ch{
    background:#f8fafc!important;padding:6px 10px!important;
    border-bottom:1px solid #e2e8f0!important;
    display:flex!important;align-items:center!important;justify-content:space-between!important;
  }
  .ct{font-size:11px!important;font-weight:800!important;}
  .cs{font-size:9px!important;}
  .cb{padding:6px 8px!important;}
  /* الشارات */
  .badge,.chip{
    display:inline-block!important;padding:1px 5px!important;
    border-radius:4px!important;font-size:8px!important;
    border:1px solid currentColor!important;
  }
  /* Charts — تُحفظ كما هي */
  canvas{max-width:100%!important;height:auto!important;}
  .chart-wrap{height:140px!important;}
  .chart-h180{height:140px!important;}
  .chart-h200{height:150px!important;}
  .chart-h220{height:160px!important;}
  .chart-h250{height:170px!important;}
  /* شريط التقدم */
  .prog-bar{display:none!important;}
  /* تقسيم الصفحات */
  .card:nth-child(n+3){page-break-before:auto;}
  h2,h3,.pdf-section-title{page-break-after:avoid;}
  /* إخفاء الـ sidebar والـ topbar تلقائياً عند الطباعة */
  .sidebar,.topbar,.sb-foot,.lding,.toast,.ov{display:none!important;}
  .main{margin-right:0!important;width:100%!important;padding:4px!important;}
  /* إظهار العنوان في الطباعة */
  .content-header{display:flex!important;}
}
/* ══ وضع الطباعة pdf-mode ══ */
body.pdf-mode .sidebar,
body.pdf-mode .topbar,
body.pdf-mode .sb-foot,
body.pdf-mode .lding,
body.pdf-mode .toast,
body.pdf-mode .ov,
body.pdf-mode .fbar .btn,
body.pdf-mode .fbar button,
body.pdf-mode .ch .btn,
body.pdf-mode .ch button,
body.pdf-mode .srow{display:none!important;}
.urole-pill.active{background:var(--R)!important;color:#fff!important;border-color:var(--R)!important;}

</style>
</head>

var STORAGE_LIMIT_MB = 500; // عدّلها حسب باقتك: Free=500 · Pro=8192
function loadStorageBar(){
  var el=document.getElementById('storage-bar'); if(!el)return;
  el.innerHTML='<div class="mc" style="margin-bottom:13px;font-size:12px;color:var(--txt3)">⏳ جاري حساب المساحة...</div>';
  call('getStorageInfo',[],function(r){
    if(!r||!r.success){el.innerHTML='<div class="al al-y" style="margin-bottom:13px">تعذّر قراءة مساحة التخزين</div>';return;}
    var usedMB=r.dbSizeBytes/1048576, limitMB=STORAGE_LIMIT_MB;
    var pct=Math.min(100,Math.round(usedMB/limitMB*100));
    var remain=Math.max(0,limitMB-usedMB);
    var color=pct>=90?'#dc2626':pct>=70?'var(--amber)':'var(--green)';
    el.innerHTML='<div class="mc" style="margin-bottom:13px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">'
      +'<div style="font-weight:800;font-size:13.5px">💾 مساحة قاعدة البيانات</div>'
      +'<div style="font-size:13px;font-weight:800;color:'+color+'">'+usedMB.toFixed(1)+' / '+limitMB+' MB</div>'
      +'</div>'
      +'<div class="prog-bar" style="height:13px"><div class="prog" style="width:'+pct+'%;background:'+color+';height:13px"></div></div>'
      +'<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--txt3);margin-top:7px">'
      +'<span>المستخدم: <b style="color:'+color+'">'+pct+'%</b></span>'
      +'<span>المتبقي: <b>'+remain.toFixed(1)+' MB</b></span>'
      +'</div></div>';
  });
}

function rDash(){return'<div class="fbar"><div><label>من تاريخ</label><input type="date" id="df" value="2025-01-01" onchange="bindDash()"/></div><div><label>إلى تاريخ</label><input type="date" id="dt" value="'+tod()+'" onchange="bindDash()"/></div><button class="btn btn-r btn-sm" onclick="bindDash()">🔄 تحديث</button></div><div id="dash-c"></div>';}
function bindDash(){var frm=(document.getElementById('df')||{}).value||'2025-01-01',to=(document.getElementById('dt')||{}).value||tod();var b=S.bookings.filter(function(x){return x.departDate>=frm&&x.departDate<=to;});var tr=S.trips.filter(function(x){return x.departDate>=frm&&x.departDate<=to;});var appr=b.filter(function(x){return x.status==='approved';}).length;var totalCost=tr.reduce(function(s,t){return s+(+t.totalCost||0);},0);var tv=tr.reduce(function(s,t){return s+(+t.numVehicles||0);},0);var totalTk=tr.reduce(function(s,t){return s+((t.ticketEmployees||[]).length);},0);var rat=S.ratings.filter(function(r){return r.departDate>=frm&&r.departDate<=to;});var posR=rat.filter(function(r){return r.rating==='satisfied';}).length;var h='<div class="g4">';[{ico:'📋',n:b.length,l:'إجمالي الطلبات',s:fmt(frm)+' — '+fmt(to),c:'#c8102e',bg:'#fff1f2'},{ico:'✅',n:appr,l:'طلبات مقبولة',s:Math.round(appr/(b.length||1)*100)+'% نسبة القبول',c:'#16a34a',bg:'#f0fdf4'},{ico:'🚌',n:tv+' سيارة',l:'سيارات + '+totalTk+' تذكرة',s:EGP(totalCost),c:'#2563eb',bg:'#eff6ff'},{ico:'⭐',n:posR,l:'تقييمات إيجابية',s:rat.length?' من '+rat.length+' تقييم':'لا توجد تقييمات',c:'#d97706',bg:'#fef3c7'}].forEach(function(s){h+='<div class="stat"><div class="st-ico" style="background:'+s.bg+'">'+s.ico+'</div><div class="st-n" style="color:'+s.c+'">'+s.n+'</div><div class="st-l">'+s.l+'</div><div class="st-s">'+s.s+'</div></div>';});h+='</div><div class="g2">';S.sectors.forEach(function(sec){var emps=S.employees.filter(function(e){return e.sectorId===sec.id;});var sbks=b.filter(function(bk){return emps.some(function(e){return e.code===bk.empCode;})&&bk.status!=='rejected';});var scost=tr.reduce(function(s,t){var cc=(t.empCodes||[]).filter(function(c){return gEffSec(c,t)===sec.id;}).length*(+t.costPerEmp||0);var tc=(t.ticketEmployees||[]).filter(function(c){return gEffSec(c,t)===sec.id;}).length*(+t.ticketCostPerEmp||0);return s+cc+tc;},0);var srat=rat.filter(function(r){return emps.some(function(e){return e.code===r.empCode;});});var sposp=srat.length?Math.round(srat.filter(function(r){return r.rating==='satisfied';}).length/srat.length*100):0;h+='<div class="mc" style="border:1.5px solid '+sec.color+'50"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div style="width:44px;height:44px;border-radius:12px;background:'+sec.bg+';display:flex;align-items:center;justify-content:center;font-size:22px">'+sec.ico+'</div><div style="flex:1"><div style="font-weight:800;font-size:14px;color:'+sec.color+'">'+sec.name+'</div><div style="font-size:11px;color:var(--txt3)">'+emps.length+' موظف</div></div><div style="text-align:center"><div style="font-size:22px;font-weight:900;color:'+sec.color+'">'+sbks.length+'</div><div style="font-size:10px;color:var(--txt3)">طلب</div></div></div><div style="display:flex;justify-content:space-between;font-size:12px;align-items:center;margin-bottom:8px"><span style="color:var(--txt3)">إجمالي التكلفة</span><span class="chip">'+EGP(scost)+'</span></div>'+(srat.length?'<div style="display:flex;justify-content:space-between;font-size:11px;align-items:center"><span style="color:var(--txt3)">رضا الموظفين</span><span class="badge b-g">'+sposp+'% إيجابي</span></div>':'')+'</div>';});h+='</div><div class="card"><div class="ch"><div class="ct">🕒 آخر الطلبات</div></div><div class="tbl"><table><thead><tr><th>رقم الحجز</th><th>مقدم الطلب</th><th>الموظف</th><th>القطاع</th><th>خط السير</th><th>النزول</th><th>العودة</th><th>الحالة</th></tr></thead><tbody>';b.slice(-7).reverse().forEach(function(bk){var em=gEmp(bk.empCode),rt=gRt(bk.routeId);var sub=bk.submittedBy&&bk.submittedBy!==bk.empCode?bk.submittedBy:'';h+='<tr><td><span style="font-family:monospace;color:var(--R);font-size:11px;font-weight:700">'+bk.ref+'</span></td><td>'+(sub?'<span class="badge b-pu" style="font-size:10px">👤 '+sub+'</span>':'<span style="color:var(--txt3);font-size:10px">—</span>')+'</td><td style="font-weight:700">'+(em.name||bk.empCode)+'</td><td>'+sTag(em.sectorId)+'</td><td>'+(rt.name||'')+'</td><td style="white-space:nowrap">'+fmt(bk.departDate)+'</td><td style="white-space:nowrap">'+fmt(bk.returnDate)+'</td><td>'+sBdg(bk.status)+'</td></tr>';});h+='</tbody></table></div></div>';var el=document.getElementById('dash-c');if(el)el.innerHTML=h;}

// ══ SECTORS / ROUTES / VEHICLES / USERS / SETTINGS ════════════════
function rSectors(){var h='<div class="card"><div class="ch"><div class="ct">🏢 القطاعات والأقسام</div>'+pBtn('sectors','add','<button class="btn btn-r btn-sm" onclick="showSecMod()">+ إضافة قطاع</button>')+'</div><div class="cb"><div class="g2">';S.sectors.forEach(function(s){h+='<div class="mc" style="border:1.5px solid '+s.color+'50"><div style="display:flex;align-items:center;gap:11px;margin-bottom:12px"><div style="width:46px;height:46px;border-radius:12px;background:'+s.bg+';display:flex;align-items:center;justify-content:center;font-size:24px">'+s.ico+'</div><div style="flex:1"><div style="font-weight:800;font-size:14px;color:'+s.color+'">'+s.name+'</div><div style="font-size:11px;color:var(--txt3)">'+s.depts.length+' قسم</div></div><div style="display:flex;gap:5px">'+pBtn('sectors','edit','<button class="btn btn-g btn-sm btn-ico" onclick="showSecMod('+s.id+')">✏</button>')+pBtn('sectors','delete','<button class="btn btn-no btn-sm btn-ico" onclick="delSec('+s.id+')">🗑</button>')+'</div></div><div style="display:flex;flex-wrap:wrap;gap:5px">'+s.depts.map(function(d){return'<span style="background:'+s.bg+';color:'+s.color+';border:1px solid '+s.color+'40;border-radius:7px;padding:2px 9px;font-size:10.5px;font-weight:600">'+d+'</span>';}).join('')+'</div></div>';});return h+'<div class="mc" style="display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px dashed #fecdd3;min-height:150px" onclick="showSecMod()"><div style="font-size:34px;color:var(--txt3);margin-bottom:7px">+</div><div style="font-size:12px;color:var(--txt3)">إضافة قطاع جديد</div></div></div></div></div>';}
var _clrs=[['#c8102e','#fff1f2'],['#ea580c','#fff7ed'],['#16a34a','#f0fdf4'],['#2563eb','#eff6ff'],['#7c3aed','#f5f3ff'],['#6b7280','#f9fafb'],['#92400e','#fef9c3']];
function showSecMod(id){var s=id?gSec(id):{};var clrBtns=_clrs.map(function(cl){return'<button onclick="setClr(\''+cl[0]+'\',\''+cl[1]+'\')" style="width:30px;height:30px;border-radius:8px;background:'+cl[0]+';border:2px solid '+((s.color||'#c8102e')===cl[0]?'#1e293b':'transparent')+';cursor:pointer" id="cc-'+cl[0].slice(1)+'"></button>';}).join('');var dpts=(s.depts&&s.depts.length?s.depts:['']);var dptsH='<div id="dlist">'+dpts.map(function(d,i){return'<div style="display:flex;gap:7px;margin-bottom:7px"><div class="fg" style="flex:1"><input value="'+d+'" placeholder="" class="di"/></div>'+(i>0?'<button class="btn btn-no btn-sm btn-ico" onclick="this.parentElement.remove()">✕</button>':'')+'</div>';}).join('')+'</div><button class="btn btn-g btn-xs" onclick="addDFld()" style="margin-top:4px">+ إضافة قسم</button>';showModal(id?'✏ تعديل قطاع':'➕ إضافة قطاع جديد','<div class="fgrid"><div class="fg"><label>اسم القطاع</label><input id="sf-n" value="'+(s.name||'')+'" placeholder="قطاع التسمين"/></div><div class="fg"><label>الأيقونة</label><input id="sf-i" value="'+(s.ico||'🏢')+'" style="font-size:18px;text-align:center"/></div><div class="fg full"><label>اللون</label><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:5px">'+clrBtns+'</div><input type="hidden" id="sf-c" value="'+(s.color||'#c8102e')+'"/><input type="hidden" id="sf-b" value="'+(s.bg||'#fff1f2')+'"/></div></div><div class="divider"></div><div class="slbl">الأقسام</div>'+dptsH,'<button class="btn btn-g" onclick="closeModal()">إلغاء</button><button class="btn btn-r" onclick="saveSec('+(id||'null')+')">💾 حفظ</button>');}
function setClr(c,b){document.getElementById('sf-c').value=c;document.getElementById('sf-b').value=b;document.querySelectorAll('[id^="cc-"]').forEach(function(x){x.style.border='2px solid transparent';});var el=document.getElementById('cc-'+c.slice(1));if(el)el.style.border='2px solid #1e293b';}

function saveSec(id){if(!canDo('sectors',id?'edit':'add')){showToast('🔒 لا تملك الصلاحية','error');return;}var dpts=Array.from(document.querySelectorAll('.di')).map(function(x){return x.value.trim();}).filter(Boolean);var d={id:id||undefined,name:document.getElementById('sf-n').value,ico:document.getElementById('sf-i').value,color:document.getElementById('sf-c').value,bg:document.getElementById('sf-b').value,depts:dpts};if(!d.name){showToast('يرجى إدخال اسم القطاع','error');return;}call(id?'updateSector':'addSector',[d],function(r){if(r.success){showToast('✅ تم الحفظ','success');closeModal();rfsh(function(){renderPage('sectors');});}else showToast('خطأ: '+r.message,'error');});}

function rRoutes(){var h='<div class="card"><div class="ch"><div class="ct">🗺 خطوط السير</div><div style="display:flex;gap:7px"><button class="btn btn-xl btn-sm" onclick="xlsxDL(\'routes\')">📥 تصدير</button>'+pBtn('routes','add','<button class="btn btn-r btn-sm" onclick="showRtMod()">+ إضافة</button>')+'</div></div><div class="tbl"><table><thead><tr><th>#</th><th>اسم الخط</th><th>من</th><th>إلى</th><th>إجراءات</th></tr></thead><tbody>';S.routes.forEach(function(r){h+='<tr><td style="color:var(--txt3)">'+r.id+'</td><td style="font-weight:700">'+r.name+'</td><td>'+r.from+'</td><td>'+r.to+'</td><td><div style="display:flex;gap:5px">'+pBtn('routes','edit','<button class="btn btn-g btn-sm" onclick="showRtMod('+r.id+')">✏</button>')+pBtn('routes','delete','<button class="btn btn-no btn-sm btn-ico" onclick="delRt('+r.id+')">🗑</button>')+'</div></td></tr>';});return h+'</tbody></table></div></div>';}

function saveRt(id){if(!canDo('routes',id?'edit':'add')){showToast('🔒 لا تملك الصلاحية','error');return;}var d={id:id||undefined,name:document.getElementById('rf-n').value,from:document.getElementById('rf-f').value,to:document.getElementById('rf-t').value};if(!d.name||!d.from||!d.to){showToast('يرجى ملء جميع الحقول','error');return;}call(id?'updateRoute':'addRoute',[d],function(r){if(r.success){showToast('✅ تم الحفظ','success');closeModal();rfsh(function(){renderPage('routes');});}else showToast('خطأ: '+r.message,'error');});}
function delRt(id){if(!canDo('routes','delete')){showToast('🔒 لا تملك صلاحية الحذف','error');return;}if(!confirm('حذف هذا الخط؟'))return;call('deleteRoute',[id],function(r){if(r.success){showToast('✅ تم الحذف','success');rfsh(function(){renderPage('routes');});}else showToast('خطأ: '+r.message,'error');});}

function rVehicles(){var h='<div class="card"><div class="ch"><div><div class="ct">🚗 أنواع السيارات والأسعار</div><div class="cs">كل نوع له سعر مخصص لكل خط</div></div>'+pBtn('vehicles','add','<button class="btn btn-r btn-sm" onclick="showVMod()">+ إضافة نوع</button>')+'</div><div class="cb"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px">';S.vehicleTypes.forEach(function(v){var vrs=S.vehRoutes.filter(function(r){return r.vehicleTypeId===v.id;});var prList=vrs.length?vrs.map(function(r){return'<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--bdr2)"><span style="color:var(--txt3)">'+(r.routeId===0?'🌐 افتراضي':r.routeName)+'</span><b>'+EGP(r.dailyCost)+'</b></div>';}).join(''):'<div style="font-size:11px;color:var(--txt3);text-align:center;padding:8px">لا توجد تسعيرات</div>';h+='<div class="mc"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div style="width:50px;height:50px;border-radius:13px;background:var(--RL);border:1px solid #fecdd3;display:flex;align-items:center;justify-content:center;font-size:26px">'+v.icon+'</div><div><div style="font-weight:800;font-size:14px">'+v.name+'</div><div style="font-size:11px;color:var(--txt3)">سعة '+v.capacity+' راكب</div></div></div><div style="border:1px solid var(--bdr);border-radius:9px;padding:10px;margin-bottom:12px"><div class="slbl" style="margin-bottom:6px">الأسعار حسب الخط</div>'+prList+'</div><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn btn-am btn-sm" style="flex:1" onclick="showPriceMod('+v.id+')">💰 تسعيرة</button><button class="btn btn-pr btn-sm" style="flex:1" onclick="showPHist('+v.id+')">📋 السجل</button></div><div style="display:flex;gap:5px;margin-top:7px">'+pBtn('vehicles','edit','<button class="btn btn-g btn-sm" style="flex:1" onclick="showVMod('+v.id+')">✏ تعديل</button>')+pBtn('vehicles','delete','<button class="btn btn-no btn-sm btn-ico" onclick="delV('+v.id+')">🗑</button>')+'</div></div>';});return h+'</div></div></div>';}
function showVMod(id){var v=id?gVeh(id):{};var rtOpts='<option value="0">🌐 افتراضي</option>'+S.routes.map(function(r){return'<option value="'+r.id+'">'+r.name+'</option>';}).join('');var routeRow=!id?'<div class="fg"><label>خط السير</label><select id="vf-rt">'+rtOpts+'</select></div><div class="fg"><label>تكلفة (ج.م/يوم)</label><input type="number" id="vf-rc"/></div>':'';showModal(id?'✏ تعديل':'➕ إضافة نوع سيارة','<div class="fgrid"><div class="fg"><label>الاسم</label><input id="vf-n" value="'+(v.name||'')+'"/></div><div class="fg"><label>الأيقونة</label><input id="vf-i" value="'+(v.icon||'🚗')+'" style="font-size:18px;text-align:center"/></div><div class="fg"><label>السعة</label><input type="number" id="vf-c" value="'+(v.capacity||'')+'"/></div><div class="fg"><label>السعر الافتراضي (ج.م/يوم)</label><input type="number" id="vf-p" value="'+(v.dailyCost||'')+'"/></div>'+routeRow+'</div>','<button class="btn btn-g" onclick="closeModal()">إلغاء</button><button class="btn btn-r" onclick="saveV('+(id||'null')+')">💾 حفظ</button>');}

function collectPerms(){
  var pages={};
  document.querySelectorAll('.perm-view').forEach(function(cb){
    var page=cb.getAttribute('data-page');

      document.querySelectorAll('.perm-act[data-page="'+page+'"]').forEach(function(a){if(a.checked)pages[page][a.getAttribute('data-act')]=true;});}

function guideEmbed(url){
  url=(url||'').trim();
  var Q='720p'; // الجودة المطلوبة (Vimeo فقط): 360p / 540p / 720p / 1080p
  var ifr='<iframe src="SRC" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;border-radius:12px" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>';
  var src='', m;
  m=url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/)||url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(/drive\.google\.com/.test(url)&&m){ src='https://drive.google.com/file/d/'+m[1]+'/preview'; }
  else if(/youtu\.be\/([a-zA-Z0-9_-]+)/.test(url)){ src='https://www.youtube.com/embed/'+url.match(/youtu\.be\/([a-zA-Z0-9_-]+)/)[1]+'?autoplay=1&mute=1&rel=0&modestbranding=1'; }
  else if(/[?&]v=([a-zA-Z0-9_-]+)/.test(url)&&/youtube\.com/.test(url)){ src='https://www.youtube.com/embed/'+url.match(/[?&]v=([a-zA-Z0-9_-]+)/)[1]+'?autoplay=1&mute=1&rel=0&modestbranding=1'; }
  else if(/youtube\.com\/embed\//.test(url)){ src=url+(url.indexOf('?')>-1?'&':'?')+'autoplay=1&mute=1&rel=0&modestbranding=1'; }
  else if(/vimeo\.com\/(\d+)/.test(url)){ src='https://player.vimeo.com/video/'+url.match(/vimeo\.com\/(\d+)/)[1]+'?autoplay=1&muted=1&quality='+Q; }
  else if(/\.(mp4|webm|ogg)(\?|$)/i.test(url)){
    return '<div style="position:relative;width:100%;padding-top:56.25%"><video src="'+url+'" autoplay muted playsinline controls style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:12px;background:#000"></video></div>';
  } else { src=url; }
  return '<div style="position:relative;width:100%;padding-top:56.25%">'+ifr.replace('SRC',src)+'</div>';
}

function guideUnmute(){
  var box=document.querySelector('#main-ov .modal');if(!box)return;
  // ملف فيديو مباشر
  var v=box.querySelector('video');
  if(v){v.muted=false;v.play();}
  // YouTube / Vimeo عبر إعادة تحميل الـ iframe بدون mute
  var f=box.querySelector('iframe');
  if(f){f.src=f.src.replace(/[&?]mute=1/,'').replace(/[&?]muted=1/,'')+(f.src.indexOf('?')>-1?'&':'?')+'autoplay=1';}
  var ov=document.getElementById('guide-unmute');if(ov)ov.style.display='none';
}

function filterUserEmp(selectedCode) {
  var q = document.getElementById('uf-e-search').value.toLowerCase();
  var sel = document.getElementById('uf-e');
  var opts = '<option value="">— اختر موظف —</option>';
  S.employees.forEach(function(e){
    var text = e.code + ' - ' + e.name;
    if(text.toLowerCase().indexOf(q) > -1) {
      opts += '<option value="'+e.code+'"'+(selectedCode===e.code?' selected':'')+'>'+text+'</option>';
    }
  });

function _mrDaysInRange(from, to){
  var days = [], d = new Date(from+'T12:00:00'), end = new Date(to+'T12:00:00'), guard = 0;
  while(d <= end && guard < 2000){
    days.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
    d.setDate(d.getDate()+1); guard++;
  }
  return days;
}

function exportMultiEmpXLSX(){
  var from = (document.getElementById('mr-from')||{}).value||'';
  var to = (document.getElementById('mr-to')||{}).value||'';
  var codes = Object.keys(_multiRptSelected);
  if(!from || !to){ showToast('يرجى تحديد الفترة','error'); return; }
  if(from > to){ showToast('تاريخ البداية بعد تاريخ النهاية','error'); return; }
  if(!codes.length){ showToast('يرجى اختيار موظف واحد على الأقل','error'); return; }
  var days = _mrDaysInRange(from, to);
  if(days.length > 200){ showToast('الفترة طويلة جداً (الحد 200 يوم)','error'); return; }

  var headers = ['كود الموظف','اسم الموظف','القطاع','القسم'];
  days.forEach(function(d){ headers.push(d.slice(8,10)+'/'+d.slice(5,7)); });
  headers.push('إجمالي النزلات','تكلفة النزلات (ج.م)','إجمالي أيام النزول');

  var data = [];
  codes.forEach(function(code){
    var em = gEmp(code);
    var empBks = S.bookings.filter(function(b){
      return String(b.empCode)===String(code) && b.status!=='rejected' && b.departDate>=from && b.departDate<=to;
    });
    var dayMark = {};
    empBks.forEach(function(b){
      if(b.departDate>=from && b.departDate<=to) dayMark[b.departDate] = b.ref || '✓';
      var cur = new Date(b.departDate+'T12:00:00'), rr = new Date(b.returnDate+'T12:00:00'), guard=0;
      cur.setDate(cur.getDate()+1);
      while(cur < rr && guard<1000){
        var key = cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
        if(key>=from && key<=to && !dayMark[key]) dayMark[key]='✓';
        cur.setDate(cur.getDate()+1); guard++;
      }
    });
    var totalDays = empBks.reduce(function(s,b){ return s + dys(b.departDate,b.returnDate); }, 0);
    var carCost = S.trips.filter(function(t){ return (t.empCodes||[]).indexOf(String(code))>-1 && t.departDate>=from && t.departDate<=to; })
      .reduce(function(s,t){ return s + (+t.costPerEmp||0); }, 0);
    var tkCost = S.trips.filter(function(t){ return (t.ticketEmployees||[]).indexOf(String(code))>-1 && t.departDate>=from && t.departDate<=to; })
      .reduce(function(s,t){ return s + (+t.ticketCostPerEmp||0); }, 0);
    var row = [code, em.name||'', (gSec(em.sectorId).name||''), (em.dept||'')];
    days.forEach(function(d){ row.push(dayMark[d]||''); });
    row.push(empBks.length, carCost+tkCost, totalDays);
    data.push(row);
  });

  var totBk = data.reduce(function(s,r){ return s + (+r[r.length-3]||0); },0);
  var totCost = data.reduce(function(s,r){ return s + (+r[r.length-2]||0); },0);
  var totDays = data.reduce(function(s,r){ return s + (+r[r.length-1]||0); },0);
  var totalRow = ['','الإجمالي','',''];
  days.forEach(function(){ totalRow.push(''); });
  totalRow.push(totBk, totCost, totDays);
  data.push(totalRow);

  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet([headers].concat(data));
  var cols = [{wch:12},{wch:24},{wch:18},{wch:20}];
  days.forEach(function(){ cols.push({wch:5}); });
  cols.push({wch:14},{wch:18},{wch:16});
  ws['!cols'] = cols;
  XLSX.utils.book_append_sheet(wb, ws, 'تقرير_جماعي');
  XLSX.writeFile(wb, 'تقرير_جماعي_'+from+'_'+to+'.xlsx');
  showToast('✅ تم تصدير التقرير','success');
  closeModal();
}

function _doAdminEmpReport(code){
  var em=gEmp(code);
  var sec=gSec(em.sectorId);
  var today=tod();
  var allBks=S.bookings.filter(function(b){return String(b.empCode)===String(code);})
    .sort(function(a,b){return b.departDate>a.departDate?1:-1;});

  // ══ نطاق التواريخ الافتراضي ══
  var minDate=allBks.length?allBks[allBks.length-1].departDate:'2025-01-01';
  var maxDate=tod();
  if(allBks.length){
    var maxD=allBks[0].departDate;
    if(maxD>maxDate)maxDate=maxD;
  }
  if(!_adminRptFrom)_adminRptFrom=minDate;
  if(!_adminRptTo)_adminRptTo=maxDate;

  // ══ تطبيق الفلتر ══
  var myBks=allBks.filter(function(b){
    return b.departDate>=_adminRptFrom&&b.departDate<=_adminRptTo;
  });

  var total=myBks.length;
  var approved=myBks.filter(function(b){return b.status==='approved';}).length;
  var pending=myBks.filter(function(b){return b.status==='pending';}).length;
  var totalDays=myBks.filter(function(b){return b.status!=='rejected';})
    .reduce(function(s,b){return s+dys(b.departDate,b.returnDate);},0);

  // ══ حساب التكاليف (للفترة المفلترة) ══
  var filteredRefs={};
  myBks.forEach(function(b){filteredRefs[b.departDate]=true;});
  var totalCarCost=S.trips.filter(function(t){return(t.empCodes||[]).indexOf(code)>-1&&t.departDate>=_adminRptFrom&&t.departDate<=_adminRptTo;})
    .reduce(function(s,t){return s+(+t.costPerEmp||0);},0);
  var totalTkCost=S.trips.filter(function(t){return(t.ticketEmployees||[]).indexOf(code)>-1&&t.departDate>=_adminRptFrom&&t.departDate<=_adminRptTo;})
    .reduce(function(s,t){return s+(+t.ticketCostPerEmp||0);},0);
  var grandTotal=totalCarCost+totalTkCost;

  // ══ شريط الفلترة ══
  var filterHtml='<div style="background:var(--bg);border:1.5px solid var(--bdr);border-radius:12px;padding:11px 14px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">'

function _adminEmpReportXLSX(code){
  var em=gEmp(code);

    .sort(function(a,b){return b.departDate>a.departDate?1:-1;});
  var headers=['رقم الحجز','خط النزول','خط العودة','تاريخ النزول','تاريخ العودة','الأيام','التنقل','التكلفة (ج.م)','مقدم الطلب','عُيِّن بواسطة','الحالة'];
  var data=myBks.map(function(b){
    var rt=gRt(b.routeId);
    var retRt=b.returnRouteId?gRt(b.returnRouteId):{};
    var effectiveRouteId=b.returnRouteId?b.returnRouteId:b.routeId;
    var carTrip=S.trips.find(function(t){return(t.empCodes||[]).indexOf(code)>-1&&t.routeId===effectiveRouteId&&t.departDate===b.departDate;});
    var tkTrip=S.trips.find(function(t){return(t.ticketEmployees||[]).indexOf(code)>-1&&t.routeId===effectiveRouteId&&t.departDate===b.departDate;});
    var isCar=!!carTrip,isTk=!carTrip&&!!tkTrip;
    var transport=isCar?'سيارة':(isTk?'تذكرة':'—');
    var empCost=isCar?(+carTrip.costPerEmp||0):(isTk?(+tkTrip.ticketCostPerEmp||0):0);
    var assignedBy=isCar?(carTrip.assignedBy||'—'):(isTk?(tkTrip.assignedBy||'—'):'—');
    var sub=b.submittedBy&&b.submittedBy!==b.empCode?b.submittedBy:'—';
    var statusAr={approved:'مقبول',pending:'معلق',rejected:'مرفوض'};
    return[b.ref,rt.name||'',retRt.name||'—',b.departDate,b.returnDate,dys(b.departDate,b.returnDate),transport,empCost,sub,assignedBy,statusAr[b.status]||b.status];

}

function showEmpHistory(){

function _empHistBCard(bkId){
  var b=S.bookings.find(function(x){return x.id===+bkId;});
  if(!b)return;
  var em=gEmp(b.empCode),rt=gRt(b.routeId),sec=gSec(em.sectorId);
  var retRt=b.returnRouteId?gRt(b.returnRouteId):{};
  var statusTxt={approved:'مقبول ✅',pending:'معلق ⏳',rejected:'مرفوض ❌'};
  var rows=[['الموظف',em.name||b.empCode],['القطاع',sec.name||''],['خط النزول',rt.name||''],['خط العودة',retRt.name||rt.name||''],['تاريخ النزول',fmt(b.departDate)],['تاريخ العودة',fmt(b.returnDate)],['مدة الغياب',dys(b.departDate,b.returnDate)+' يوم'],['الحالة',statusTxt[b.status]||b.status]];
  showModal('🎫 بطاقة الحجز',
    '<div class="bcard">'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:14px;align-items:flex-start">'
    +'<div><div style="font-size:18px;font-weight:900;color:var(--R)">Cairo 3A Poultry</div><div style="font-size:10px;color:var(--txt3)">نظام إدارة إجازات الأسطول</div></div>'
    +sBdg(b.status)+'</div>'
    +'<div class="bcard-ref">'+b.ref+'</div>'
    +rows.map(function(r){return'<div class="bcard-row"><span style="color:var(--txt3);font-weight:600">'+r[0]+'</span><b>'+(r[1]||'—')+'</b></div>';}).join('')

    '<button class="btn btn-g" onclick="showEmpHistory()">↩ رجوع</button>'
    +'<button class="btn btn-pr" onclick="window.print()">🖨️ طباعة</button>'
  );
}

function _empHistXLSX(){
  var code=S.user?S.user.empCode:'';
  var em=gEmp(code);
  var myBks=S.bookings.filter(function(b){return String(b.empCode)===String(code)&&b.departDate>=_empHistFrom&&b.departDate<=_empHistTo;})
    .sort(function(a,b){return b.departDate>a.departDate?1:-1;});
  var headers=['رقم الحجز','خط النزول','خط العودة','تاريخ النزول','تاريخ العودة','مدة الغياب (أيام)','التنقل','الحالة'];
  var data=myBks.map(function(b){
    var rt=gRt(b.routeId);
    var retRt=b.returnRouteId?gRt(b.returnRouteId):{};
    var effectiveRouteId=b.returnRouteId?b.returnRouteId:b.routeId;
    var carTrip=S.trips.find(function(t){return(t.empCodes||[]).indexOf(b.empCode)>-1&&t.routeId===effectiveRouteId&&t.departDate===b.departDate;});
    var tkTrip=S.trips.find(function(t){return(t.ticketEmployees||[]).indexOf(b.empCode)>-1&&t.routeId===effectiveRouteId&&t.departDate===b.departDate;});
    var transport=carTrip?'سيارة':(tkTrip?'تذكرة':'—');
    var statusAr={approved:'مقبول',pending:'معلق',rejected:'مرفوض'};
    return[b.ref,rt.name||'',retRt.name||rt.name||'',b.departDate,b.returnDate,dys(b.departDate,b.returnDate),transport,statusAr[b.status]||b.status];
  });
  xlsxDirect('سجل_إجازات_'+em.name+'_'+_empHistFrom+'_'+_empHistTo,headers,data);
}

function showBudgetMod(secId,yr,mo){var cy=+(document.getElementById('bud-yr')||{}).value||new Date().getFullYear();var secOpts=S.sectors.map(function(s){return'<option value="'+s.id+'"'+(s.id==secId?' selected':'')+'>'+s.ico+' '+s.name+'</option>';}).join('');var yrs=[cy-1,cy,cy+1,cy+2];var yOpts=yrs.map(function(y){return'<option value="'+y+'"'+((yr||cy)===y?' selected':'')+'>'+y+'</option>';}).join('');var mOpts=MONTHS_AR.map(function(mn,i){return'<option value="'+(i+1)+'"'+((mo||(new Date().getMonth()+1))===(i+1)?' selected':'')+'>'+mn+'</option>';}).join('');var existing=secId&&yr&&mo?S.budgets.find(function(b){return b.sectorId==secId&&b.year==(yr||cy)&&b.month==mo;}):null;showModal('💵 '+(existing?'تعديل':'إضافة')+' ميزانية','<div class="fgrid"><div class="fg"><label>القطاع</label><select id="bd-sec">'+secOpts+'</select></div><div class="fg"><label>السنة</label><select id="bd-yr">'+yOpts+'</select></div><div class="fg"><label>الشهر</label><select id="bd-mo">'+mOpts+'</select></div><div class="fg"><label>المبلغ (ج.م)</label><input type="number" id="bd-amt" min="0" value="'+(existing?existing.amount:'')+'" placeholder="50000"/></div><div class="fg full"><label>ملاحظات</label><input id="bd-notes" value="'+(existing?existing.notes||'':'')+'"/></div></div>','<button class="btn btn-g" onclick="closeModal()">إلغاء</button><button class="btn btn-r" onclick="saveBudgetEntry()">💾 حفظ</button>');}

function rBudgetDash(){var cy=new Date().getFullYear();var secOpts=S.sectors.map(function(s){return'<option value="'+s.id+'">'+s.ico+' '+s.name+'</option>';}).join('');return'<div class="fbar"><div><label>السنة</label><select id="bdsh-yr" onchange="bindBudgetDash()"><option value="'+(cy-1)+'">'+(cy-1)+'</option><option value="'+cy+'" selected>'+cy+'</option><option value="'+(cy+1)+'">'+(cy+1)+'</option></select></div><div><label>القطاع</label><select id="bdsh-sec" onchange="bindBudgetDash()"><option value="">كل القطاعات</option>'+secOpts+'</select></div><div style="margin-right:auto;display:flex;gap:8px"><button class="btn btn-r btn-sm" onclick="bindBudgetDash()">🔄 تحديث</button><button class="btn btn-pr btn-sm" onclick="window.print()">🖨️ طباعة</button><button class="btn btn-pu btn-sm" onclick="pdfBudgetDash()">📄 PDF</button></div></div><div id="bdsh-body"></div>';}
function bindBudgetDash(){var secF=(document.getElementById('bdsh-sec')||{}).value||'';var yr=+(document.getElementById('bdsh-yr')||{}).value||new Date().getFullYear();var sectors=secF?S.sectors.filter(function(s){return s.id==secF;}):S.sectors;function getCarActual(secId,mo){return S.trips.filter(function(t){var d=new Date(t.departDate+'T00:00:00');return d.getFullYear()===yr&&(d.getMonth()+1)===mo;}).reduce(function(s,t){return s+(+t.costPerEmp||0)*((t.empCodes||[]).filter(function(c){return gEffSec(c,t)===secId;}).length);},0);}function getTkActual(secId,mo){return S.trips.filter(function(t){var d=new Date(t.departDate+'T00:00:00');return d.getFullYear()===yr&&(d.getMonth()+1)===mo;}).reduce(function(s,t){return s+(+t.ticketCostPerEmp||0)*((t.ticketEmployees||[]).filter(function(c){return gEffSec(c,t)===secId;}).length);},0);}function getActual(secId,mo){return getCarActual(secId,mo)+getTkActual(secId,mo);}function getBudget(secId,mo){var mb=S.budgets.find(function(b){return b.sectorId===secId&&b.year===yr&&b.month===mo;});return mb?mb.amount:0;}var totalBudget=0,totalCar=0,totalTk=0;sectors.forEach(function(sec){for(var m=1;m<=12;m++){totalBudget+=getBudget(sec.id,m);totalCar+=getCarActual(sec.id,m);totalTk+=getTkActual(sec.id,m);}});var totalActual=totalCar+totalTk;var deviation=totalActual-totalBudget,devPct=totalBudget?Math.round(Math.abs(deviation)/totalBudget*100):0;var h='<div class="g4">'+[{ico:'💵',n:EGP(totalBudget),l:'الميزانية المخططة',c:'#2563eb',bg:'#eff6ff',s:'السنة '+yr},{ico:'🚌',n:EGP(totalCar),l:'تكلفة السيارات',c:'#c8102e',bg:'#fff1f2',s:'رحلات الموظفين'},{ico:'🎫',n:EGP(totalTk),l:'تكلفة التذاكر',c:'#7c3aed',bg:'#f5f3ff',s:'تذاكر الباص'},{ico:deviation>0?'⬆':'⬇',n:EGP(Math.abs(deviation)),l:deviation>0?'تجاوز الميزانية':'توفير',c:deviation>0?'#dc2626':'#16a34a',bg:deviation>0?'#fee2e2':'#f0fdf4',s:devPct+'% انحراف'}].map(function(s){return'<div class="stat"><div class="st-ico" style="background:'+s.bg+'">'+s.ico+'</div><div class="st-n" style="color:'+s.c+'">'+s.n+'</div><div class="st-l">'+s.l+'</div><div class="st-s">'+s.s+'</div></div>';}).join('')+'</div>';var allBudgetData=MONTHS_AR.map(function(mn,i){return sectors.reduce(function(s,sec){return s+getBudget(sec.id,i+1);},0);});var allCarData=MONTHS_AR.map(function(mn,i){return sectors.reduce(function(s,sec){return s+getCarActual(sec.id,i+1);},0);});var allTkData=MONTHS_AR.map(function(mn,i){return sectors.reduce(function(s,sec){return s+getTkActual(sec.id,i+1);},0);});h+='<div class="card"><div class="ch"><div class="ct">📊 الميزانية مقابل المصروف — '+yr+'</div></div><div class="cb"><div class="chart-wrap chart-h250"><canvas id="bud-monthly"></canvas></div></div></div>';h+='<div class="g2"><div class="card"><div class="ch"><div class="ct">🏢 المصروف حسب القطاع</div></div><div class="cb"><div class="chart-wrap chart-h220"><canvas id="bud-dev-sec"></canvas></div></div></div><div class="card"><div class="ch"><div class="ct">🥧 توزيع المصروف</div></div><div class="cb"><div class="chart-wrap chart-h220"><canvas id="bud-pie"></canvas></div></div></div></div>';h+='<div class="card"><div class="ch"><div class="ct">📋 تفاصيل القطاعات — '+yr+'</div></div><div class="tbl"><table><thead><tr><th>القطاع</th>';MONTHS_AR.forEach(function(mn){h+='<th style="font-size:9px">'+mn+'</th>';});h+='<th>ميزانية</th><th>سيارات</th><th>تذاكر</th><th>الإجمالي</th><th>الانحراف</th></tr></thead><tbody>';sectors.forEach(function(sec){var secTotBud=0,secTotCar=0,secTotTk=0;h+='<tr><td style="white-space:nowrap">'+sTag(sec.id)+'</td>';for(var m=1;m<=12;m++){var bud=getBudget(sec.id,m),car=getCarActual(sec.id,m),tk=getTkActual(sec.id,m),act=car+tk;secTotBud+=bud;secTotCar+=car;secTotTk+=tk;var bg='',clr='';if(bud>0){var rv=act/bud;bg=rv>1?'#fee2e2':rv>0.85?'#fef3c7':'#f0fdf4';clr=rv>1?'#dc2626':rv>0.85?'var(--amber)':'var(--green)';}h+='<td style="text-align:center;background:'+bg+';font-size:10px;padding:5px">';if(bud>0)h+='<div style="font-weight:700;color:'+clr+'">'+EGP(act)+'</div><div style="font-size:8px;color:var(--txt3)">/ '+EGP(bud)+'</div>';else if(act>0)h+='<div style="font-size:10px;color:var(--blue);font-weight:700">'+EGP(act)+'</div>';else h+='<span style="color:var(--txt3)">—</span>';h+='</td>';}var secTotAct=secTotCar+secTotTk,secDev=secTotAct-secTotBud;h+='<td><span class="chip">'+EGP(secTotBud)+'</span></td><td><span class="chip" style="background:#fff1f2;border-color:#fecdd3;color:var(--R)">'+EGP(secTotCar)+'</span></td><td><span class="chip" style="background:#f5f3ff;border-color:#ddd6fe;color:var(--purple)">'+EGP(secTotTk)+'</span></td><td><span class="chip" style="background:#eff6ff;border-color:#bfdbfe;color:var(--blue)">'+EGP(secTotAct)+'</span></td><td><span class="chip" style="background:'+(secDev>0?'#fee2e2':'#f0fdf4')+';color:'+(secDev>0?'#dc2626':'var(--green)')+'">'+( secTotBud>0?(secDev>0?'▲ ':'▼ ')+EGP(Math.abs(secDev)):'—')+'</span></td></tr>';});h+='</tbody></table></div></div>';var el=document.getElementById('bdsh-body');if(el)el.innerHTML=h;setTimeout(function(){try{if(document.getElementById('bud-monthly'))_newChart('bud-monthly',{type:'bar',data:{labels:MONTHS_AR,datasets:[{label:'الميزانية',data:allBudgetData,type:'line',borderColor:'#2563eb',pointRadius:4,fill:false,backgroundColor:'rgba(37,99,235,.6)'},{label:'🚌 سيارات',data:allCarData,backgroundColor:'rgba(200,16,46,.8)',borderRadius:5},{label:'🎫 تذاكر',data:allTkData,backgroundColor:'rgba(124,58,237,.8)',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11}}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{callback:function(v){return EGP(v);}},beginAtZero:true}}}});var devData=sectors.map(function(sec){var car=0,tk=0;for(var m=1;m<=12;m++){car+=getCarActual(sec.id,m);tk+=getTkActual(sec.id,m);}return{name:sec.ico+' '+sec.name,car:car,tk:tk};}).filter(function(d){return d.car+d.tk>0;});if(document.getElementById('bud-dev-sec')&&devData.length)_newChart('bud-dev-sec',{type:'bar',data:{labels:devData.map(function(d){return d.name;}),datasets:[{label:'🚌 سيارات',data:devData.map(function(d){return d.car;}),backgroundColor:'rgba(200,16,46,.75)',borderRadius:5},{label:'🎫 تذاكر',data:devData.map(function(d){return d.tk;}),backgroundColor:'rgba(124,58,237,.75)',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},scales:{x:{ticks:{font:{size:9}}},y:{ticks:{callback:function(v){return EGP(v);}},beginAtZero:true,stacked:true}}}});var pieData=[{name:'🚌 سيارات',val:totalCar,color:'#c8102e'},{name:'🎫 تذاكر',val:totalTk,color:'#7c3aed'}].filter(function(d){return d.val>0;});if(document.getElementById('bud-pie')&&pieData.length)_newChart('bud-pie',{type:'doughnut',data:{labels:pieData.map(function(d){return d.name;}),datasets:[{data:pieData.map(function(d){return d.val;}),backgroundColor:pieData.map(function(d){return d.color;}),borderWidth:3,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:14}}}}});}catch(e){console.log('budget chart err',e);}},100);}
</script>
<script>
// ══ REQUESTS PAGE ═══════════════════════════════════════════════════
function rReqs(){return'<div class="card"><div class="ch"><div><div class="ct">📋 طلبات الحجز</div></div><div class="srow"><div class="sbox">🔍 <input id="rs" placeholder="بحث..." oninput="fReqs()" style="width:160px"/></div><select class="flt" id="rsec" onchange="fReqs()"><option value="">كل القطاعات</option>'+S.sectors.map(function(s){return'<option value="'+s.id+'">'+s.ico+' '+s.name+'</option>';}).join('')+'</select><div style="display:flex;flex-direction:column;gap:3px"><label style="font-size:9.5px;font-weight:700;color:var(--txt3);text-transform:uppercase">فلترة بيوم النزول</label><input type="date" id="r-date-filter" onchange="fReqs()" style="background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;padding:6px 10px;font-size:12px;color:var(--txt);outline:none;font-family:inherit;direction:ltr"/></div><button class="btn btn-g btn-sm" onclick="clearDateFilter()" title="إلغاء فلتر التاريخ">✕ إلغاء</button>'+pBtn('requests','add','<button class="btn btn-r btn-sm" onclick="showAdminBookMod()">➕ حجز جديد</button>')+(canBulk()?'<button class="btn btn-pu btn-sm" onclick="showBulkBookMod()">👥 حجز مجمّع</button>':'')+pBtn('requests','import','<button class="btn btn-am btn-sm" onclick="showImportMod()">📤 استيراد إكسيل</button>')+'<button class="btn btn-xl btn-sm" onclick="xlsxDL(\'bookings\')">📥 Excel</button><button class="btn btn-r btn-sm" onclick="rfsh(function(){renderPage(\'requests\');})">🔄 تحديث</button></div></div><div style="padding:9px 14px;border-bottom:1px solid var(--bdr);background:#fafbfc;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px"><div class="tabs-r" id="rtabs"><button class="tab-b active" onclick="sRT(this,\'all\')">الكل</button><button class="tab-b" onclick="sRT(this,\'pending\')">معلقة</button><button class="tab-b" onclick="sRT(this,\'approved\')">مقبولة</button><button class="tab-b" onclick="sRT(this,\'rejected\')">مرفوضة</button></div><button class="btn btn-ok btn-sm" id="bulk-approve-btn" onclick="bulkApproveDay()" style="display:none">✅ قبول جميع المعلقة</button></div><div id="req-summary" style="display:none;padding:9px 17px;background:#f0fdf4;border-bottom:1px solid #bbf7d0;font-size:12px;color:var(--green);font-weight:700"></div><div class="tbl" id="rtbl"></div></div>';}

var _rt='all';
function sRT(b,t){_rt=t;document.querySelectorAll('#rtabs .tab-b').forEach(function(x){x.classList.remove('active');});b.classList.add('active');fReqs();}
function bindReqs(){fReqs();}
function clearDateFilter(){var df=document.getElementById('r-date-filter');if(df)df.value='';fReqs();}

function fReqs(){var s=(document.getElementById('rs')||{}).value||'';var sec=(document.getElementById('rsec')||{}).value||'';var dateF=(document.getElementById('r-date-filter')||{}).value||'';var fl=S.bookings.filter(function(b){if(_rt!=='all'&&b.status!==_rt)return false;var em=gEmp(b.empCode);if(sec&&em.sectorId!=sec)return false;if(dateF&&b.departDate!==dateF)return false;if(s){var rt=gRt(b.routeId);return(em.name||'').includes(s)||(b.empCode||'').includes(s)||(b.ref||'').includes(s)||(rt.name||'').includes(s)||(b.submittedBy||'').includes(s);}return true;});var pendingInView=fl.filter(function(b){return b.status==='pending';});var bulkBtn=document.getElementById('bulk-approve-btn');var summaryEl=document.getElementById('req-summary');if(bulkBtn){if(dateF&&pendingInView.length>0){bulkBtn.style.display='';bulkBtn.textContent='✅ قبول '+pendingInView.length+' طلب معلق ليوم '+fmt(dateF);}else bulkBtn.style.display='none';}if(summaryEl){if(dateF&&fl.length>0){var appr=fl.filter(function(b){return b.status==='approved';}).length;var pend=fl.filter(function(b){return b.status==='pending';}).length;var rej=fl.filter(function(b){return b.status==='rejected';}).length;summaryEl.style.display='';summaryEl.innerHTML='📅 يوم '+fmt(dateF)+' — إجمالي: <b>'+fl.length+'</b> | مقبولة: <b>'+appr+'</b> | معلقة: <b>'+pend+'</b> | مرفوضة: <b>'+rej+'</b>';}else summaryEl.style.display='none';}var h='<table><thead><tr><th>رقم الحجز</th><th>مقدم الطلب</th><th>الموظف</th><th>القطاع</th><th>خط النزول</th><th>خط العودة</th><th>النزول</th><th>العودة</th><th>الأيام</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>';if(!fl.length)h+='<tr><td colspan="11"><div class="empty">لا توجد طلبات</div></td></tr>';fl.forEach(function(b){var em=gEmp(b.empCode),rt=gRt(b.routeId);var retRt=b.returnRouteId?gRt(b.returnRouteId):{};var sub=b.submittedBy&&b.submittedBy!==b.empCode?b.submittedBy:'';var acts='<div style="display:flex;gap:4px">';if(b.status==='pending')acts+=pBtn('requests','approve','<button class="btn btn-ok btn-sm btn-ico" onclick="updStat('+b.id+',\'approved\')" title="قبول">✓</button><button class="btn btn-no btn-sm btn-ico" onclick="updStat('+b.id+',\'rejected\')" title="رفض">✕</button>');if(b.status==='approved')acts+=pBtn('requests','approve','<button class="btn btn-g btn-sm" onclick="updStat('+b.id+',\'rejected\')">إلغاء</button>');acts+=pBtn('requests','edit','<button class="btn btn-pr btn-sm btn-ico" onclick="showBkEditMod('+b.id+')" title="تعديل">✏</button>');if(b.status==='approved')acts+=pBtn('requests','edit','<button class="btn btn-am btn-sm" onclick="showRetRouteMod('+b.id+')" style="font-size:10px">↩ عودة</button>');if(b.status!=='rejected')acts+=pBtn('requests','edit','<button class="btn btn-pu btn-sm" onclick="showCostSectorMod('+b.id+')" style="font-size:10px" title="تحويل قطاع التكلفة">🔀 قطاع</button>');acts+='<button class="btn btn-am btn-sm btn-ico" onclick="showBCard('+b.id+')" title="بطاقة">🎫</button></div>';h+='<tr><td><span style="font-family:monospace;color:var(--R);font-size:11px;font-weight:700;cursor:pointer;text-decoration:underline" onclick="showBCard('+b.id+')">'+b.ref+'</span></td><td>'+(sub?'<span class="badge b-pu" style="font-size:10px">👤 '+sub+'</span>':'<span style="color:var(--txt3);font-size:11px">—</span>')+'</td><td><div style="font-weight:700">'+(em.name||b.empCode)+'</div><div style="font-size:10px;color:var(--txt3)">'+(em.dept||'')+'</div></td><td>'+sTag(em.sectorId)+(b.departCostSectorId&&b.departCostSectorId!==em.sectorId?'<br><span class="badge b-pu" style="font-size:9px;margin-top:3px">🔀📤 '+(gSec(b.departCostSectorId).name||'')+'</span>':'')+(b.returnCostSectorId&&b.returnCostSectorId!==em.sectorId?'<br><span class="badge b-rt-change" style="font-size:9px;margin-top:3px">🔀📥 '+(gSec(b.returnCostSectorId).name||'')+'</span>':'')+'</td><td style="font-size:12px">'+(rt.name||'')+'</td><td>'+(retRt.name?'<span class="badge b-rt-change" style="font-size:10px">↩ '+retRt.name+'</span>':'<span style="color:var(--txt3);font-size:10px">نفس النزول</span>')+'</td><td style="white-space:nowrap">'+fmt(b.departDate)+'</td><td style="white-space:nowrap">'+fmt(b.returnDate)+'</td><td style="text-align:center;font-weight:700;color:var(--R)">'+dys(b.departDate,b.returnDate)+'</td><td>'+sBdg(b.status)+'</td><td>'+acts+'</td></tr>';});var el=document.getElementById('rtbl');if(el)el.innerHTML=h+'</tbody></table>';}

function showRetRouteMod(bkId){var b=S.bookings.find(function(x){return x.id===+bkId;});if(!b)return;var em=gEmp(b.empCode),rt=gRt(b.routeId);var currentRetRt=b.returnRouteId?gRt(b.returnRouteId):{};var rtOpts=S.routes.map(function(r){return'<option value="'+r.id+'"'+(b.returnRouteId===r.id||(!b.returnRouteId&&r.id===b.routeId)?' selected':'')+'>'+r.name+'</option>';}).join('');showModal('↩ تغيير خط العودة','<div class="al al-y" style="margin-bottom:14px">⚠ تغيير خط العودة لن يؤثر على خط النزول<br><small>الموظف: <b>'+(em.name||b.empCode)+'</b> — الحجز: <b>'+b.ref+'</b></small></div><div style="background:var(--bg);border:1.5px solid var(--bdr);border-radius:12px;padding:13px;margin-bottom:13px;display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><div style="font-size:10px;color:var(--txt3);font-weight:700;text-transform:uppercase;margin-bottom:4px">خط النزول (ثابت)</div><div style="font-size:13px;font-weight:800;color:var(--R)">🔒 '+(rt.name||'')+'</div></div><div><div style="font-size:10px;color:var(--txt3);font-weight:700;text-transform:uppercase;margin-bottom:4px">خط العودة الحالي</div><div style="font-size:13px;font-weight:700;color:var(--amber)">'+(currentRetRt.name?'↩ '+currentRetRt.name:'نفس خط النزول')+'</div></div></div><div class="fgrid"><div class="fg full"><label>خط العودة الجديد</label><select id="rr-rt">'+rtOpts+'</select></div><div class="fg full"><label>ملاحظة (اختياري)</label><input id="rr-note" placeholder="سبب تغيير خط العودة..."/></div></div>','<button class="btn btn-g" onclick="closeModal()">إلغاء</button><button class="btn btn-am" onclick="saveRetRoute('+bkId+')">↩ حفظ خط العودة</button>');}
function saveRetRoute(bkId){var rtEl=document.getElementById('rr-rt');var newRouteId=+rtEl.value;var note=document.getElementById('rr-note').value;if(!newRouteId){showToast('يرجى اختيار خط العودة','error');return;}call('updateBookingReturnRoute',[bkId,newRouteId,note],function(r){if(r.success){showToast('✅ تم تغيير خط العودة','success');closeModal();rfsh(function(){fReqs();});}else showToast('خطأ: '+r.message,'error');});}

function bulkApproveDay(){var dateF=(document.getElementById('r-date-filter')||{}).value||'';var sec=(document.getElementById('rsec')||{}).value||'';if(!dateF){showToast('يرجى تحديد تاريخ أولاً','error');return;}var pending=S.bookings.filter(function(b){if(b.status!=='pending'||b.departDate!==dateF)return false;if(sec){var em=gEmp(b.empCode);if(em.sectorId!=sec)return false;}return true;});if(!pending.length){showToast('لا توجد طلبات معلقة في هذا اليوم','error');return;}var count=pending.length;showModal('✅ قبول جماعي — '+fmt(dateF),'<div class="al al-g" style="font-size:14px;font-weight:700;margin-bottom:14px">سيتم قبول '+count+' طلب معلق ليوم '+fmt(dateF)+'</div><div style="background:var(--bg);border:1px solid var(--bdr);border-radius:11px;padding:12px;max-height:240px;overflow-y:auto">'+pending.map(function(b){var em=gEmp(b.empCode),rt=gRt(b.routeId);return'<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--bdr2)"><span style="font-family:monospace;color:var(--R);font-size:11px;font-weight:700;min-width:120px">'+b.ref+'</span><span style="font-weight:700;flex:1">'+(em.name||b.empCode)+'</span><span style="font-size:11px;color:var(--txt3)">'+(rt.name||'')+'</span></div>';}).join('')+'</div>','<button class="btn btn-g" onclick="closeModal()">إلغاء</button><button class="btn btn-ok" onclick="doBulkApprove()">✅ تأكيد قبول الكل</button>');}
function doBulkApprove(){var dateF=(document.getElementById('r-date-filter')||{}).value||'';var sec=(document.getElementById('rsec')||{}).value||'';var pending=S.bookings.filter(function(b){if(b.status!=='pending'||b.departDate!==dateF)return false;if(sec){var em=gEmp(b.empCode);if(em.sectorId!=sec)return false;}return true;});if(!pending.length){closeModal();return;}closeModal();showLoad(true);var done=0,total=pending.length;pending.forEach(function(b){google.script.run.withSuccessHandler(function(){done++;if(done===total){showLoad(false);showToast('✅ تم قبول '+total+' طلب بنجاح','success');rfsh(function(){fReqs();});}}).withFailureHandler(function(){done++;if(done===total){showLoad(false);rfsh(function(){fReqs();});}}).updateBookingStatus(b.id,'approved');});}
