// ── small helpers ───────────────────────────────────────────────────
function _pad2(x){x=String(x);return x.length<2?'0'+x:x;}
function _normDate(v){
  if(v instanceof Date && !isNaN(v.getTime()))return v.getFullYear()+'-'+_pad2(v.getMonth()+1)+'-'+_pad2(v.getDate());
  var s=String(v||'').trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
  var m=s.match(/^(\d{4})[\/.](\d{1,2})[\/.](\d{1,2})$/);if(m)return m[1]+'-'+_pad2(m[2])+'-'+_pad2(m[3]);
  var m2=s.match(/^(\d{1,2})[\/.](\d{1,2})[\/.](\d{4})$/);if(m2)return m2[3]+'-'+_pad2(m2[2])+'-'+_pad2(m2[1]);
  return'';
}
function _routeIdByName(name){
  var nm=String(name||'').trim();if(!nm)return 0;
  var r=S.routes.find(function(x){return String(x.name).trim()===nm;});
  if(r)return r.id;
  r=S.routes.find(function(x){return String(x.name).trim().toLowerCase()===nm.toLowerCase();});
  return r?r.id:-1;
}
function _downloadBlob(buf,filename,mime){
  var blob=new Blob([buf],{type:mime||'application/octet-stream'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1500);
}
function _loadExcelJS(cb){
  if(window.ExcelJS){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js';
  s.onload=function(){cb();};
  s.onerror=function(){showToast('تعذّر تحميل مكتبة الإكسيل — تأكد من الاتصال','error');};
  document.head.appendChild(s);
}

// ════════════════ SHARED SEQUENTIAL BATCH ENGINE ════════════════════
// rows: [{empCode,routeId,departDate,returnDate, returnRouteId?, departCostSectorId?, returnCostSectorId?}]
function runBookingBatch(rows,title,onDone){
  if(!rows||!rows.length){showToast('لا يوجد صفوف صالحة','error');return;}
  var results=[],i=0,total=rows.length;
  showModal(title||'⏳ جارٍ التنفيذ','<div id="bb-prog" style="text-align:center;padding:10px 4px"></div>','');
  function paint(done,name){
    var pct=Math.round(done/total*100);var el=document.getElementById('bb-prog');if(!el)return;
    el.innerHTML='<div style="font-size:13px;font-weight:700;margin-bottom:10px">'+(name?('جارٍ: '+name):'')+'</div>'+
      '<div style="background:var(--bdr2);border-radius:99px;height:14px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,var(--R),var(--R2));transition:width .2s"></div></div>'+
      '<div style="font-size:12px;color:var(--txt3);margin-top:8px">'+done+' / '+total+'</div>';
  }
  paint(0,(gEmp(rows[0].empCode).name||rows[0].empCode));
  function next(){
    if(i>=total){onDone(results);return;}
    var row=rows[i],em=gEmp(row.empCode);
    paint(i,(em.name||row.empCode));
    google.script.run.withSuccessHandler(function(r){
      if(r&&r.success){
        results.push({code:row.empCode,name:(em.name||row.empCode),ok:true,ref:r.ref,id:r.id,routeId:row.routeId,returnRouteId:(row.returnRouteId||0),departDate:row.departDate,returnDate:row.returnDate});
        applyExtras(r.id,row);
      }else{results.push({code:row.empCode,name:(em.name||row.empCode),ok:false,msg:((r&&r.message)||'فشل')});i++;next();}
    }).withFailureHandler(function(e){
      results.push({code:row.empCode,name:(em.name||row.empCode),ok:false,msg:((e&&e.message)||'فشل الاتصال')});i++;next();
    }).addBooking({empCode:row.empCode,routeId:row.routeId,departDate:row.departDate,returnDate:row.returnDate,submittedBy:(S.user?S.user.username:'admin')});
    function applyExtras(bkId,row){
      var tasks=[];
      if(row.returnRouteId&&row.returnRouteId!==row.routeId)tasks.push(function(cb){google.script.run.withSuccessHandler(cb).withFailureHandler(cb).updateBookingReturnRoute(bkId,row.returnRouteId,'دفعة');});
      if(row.departCostSectorId)tasks.push(function(cb){google.script.run.withSuccessHandler(cb).withFailureHandler(cb).updateBookingCostSector(bkId,'depart',row.departCostSectorId,'دفعة');});
      if(row.returnCostSectorId)tasks.push(function(cb){google.script.run.withSuccessHandler(cb).withFailureHandler(cb).updateBookingCostSector(bkId,'return',row.returnCostSectorId,'دفعة');});
      var t=0;(function rn(){if(t>=tasks.length){i++;next();return;}tasks[t++](rn);})();
    }
  }
  next();
}

function bulkRowIssue(row){

function handleImportFile(input){
  var files=input.files;if(!files||!files.length)return;
  var names=Array.prototype.map.call(files,function(f){return f.name;});
  document.getElementById('imp-fname').textContent='📄 '+files.length+' ملف: '+names.join('، ');
  var all=[],done=0,total=files.length,hadError=false;
  Array.prototype.forEach.call(files,function(file){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var data=new Uint8Array(e.target.result);
        var wb=XLSX.read(data,{type:'array',cellDates:true});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
        all=all.concat(_extractImportRows(rows,file.name));
      }catch(err){hadError=true;}
      done++;if(done===total){if(hadError&&!all.length){showToast('تعذّر قراءة الملفات','error');return;}_validateImport(all);}
    };
    reader.onerror=function(){done++;if(done===total)_validateImport(all);};
    reader.readAsArrayBuffer(file);
  });
}
function _extractImportRows(rows,fileName){
  if(!rows||rows.length<2)return[];
  var head=rows[0].map(function(h){return String(h||'').trim();});
  function colIdx(keys){for(var i=0;i<head.length;i++){for(var k=0;k<keys.length;k++){if(head[i].indexOf(keys[k])>-1)return i;}}return -1;}
  var ci={code:colIdx(['كود','code','Code']),dep:colIdx(['تاريخ النزول','نزول','depart']),drt:colIdx(['خط النزول']),ret:colIdx(['تاريخ العودة','عودة']),rrt:colIdx(['خط العودة'])};
  if(ci.code<0)ci.code=0;if(ci.dep<0)ci.dep=1;if(ci.drt<0)ci.drt=2;if(ci.ret<0)ci.ret=3;if(ci.rrt<0)ci.rrt=4;
  var out=[];
  for(var i=1;i<rows.length;i++){
    var row=rows[i];if(!row)continue;
    var rawCode=String(row[ci.code]||'').trim();
    if(!rawCode&&!row[ci.dep]&&!row[ci.drt])continue;
    out.push({file:fileName||'',srcRow:i+1,codeRaw:rawCode,depRaw:row[ci.dep],drtRaw:row[ci.drt],retRaw:row[ci.ret],rrtRaw:row[ci.rrt]});
  }
  return out;
}
function _validateImport(items){
  if(!items||!items.length){document.getElementById('imp-preview').innerHTML='<div class="al al-r">الملفات فارغة أو لا تحتوي بيانات</div>';return;}
  _importRows=[];var seen=[];
  for(var i=0;i<items.length;i++){
    var it=items[i];
    var rec={raw:i+1,file:it.file,empCode:it.codeRaw,departDate:'',returnDate:'',routeId:0,returnRouteId:0,issue:''};
    var em=S.employees.find(function(e){return String(e.code).trim()===it.codeRaw||String(e.code).trim().toLowerCase()===it.codeRaw.toLowerCase();});
    if(!em||!em.code){rec.issue='كود غير موجود';_importRows.push(rec);continue;}
    rec.empCode=em.code;
    if(_importSectorLock!=null&&String(em.sectorId)!==String(_importSectorLock)){rec.issue='خارج قطاعك';_importRows.push(rec);continue;}
    var dep=_normDate(it.depRaw),ret=_normDate(it.retRaw);
    rec.departDate=dep;rec.returnDate=ret;
    var drtId=_routeIdByName(it.drtRaw);
    var rrtId=_routeIdByName(it.rrtRaw);
    if(drtId===-1){rec.issue='خط نزول غير معروف';_importRows.push(rec);continue;}
    if(drtId===0){rec.issue='خط النزول مطلوب';_importRows.push(rec);continue;}
    rec.routeId=drtId;
    if(rrtId===-1){rec.issue='خط عودة غير معروف';_importRows.push(rec);continue;}
    rec.returnRouteId=(rrtId&&rrtId!==drtId?rrtId:0);
    if(!dep||!ret){rec.issue='تواريخ غير صحيحة';_importRows.push(rec);continue;}
    if(ret<dep){rec.issue='العودة قبل النزول';_importRows.push(rec);continue;}
    var ov=S.bookings.find(function(b){if(String(b.empCode)!==String(em.code)||b.status==='rejected')return false;return!(ret<b.departDate||dep>b.returnDate);});
    if(ov){rec.issue='تداخل مع '+ov.ref;_importRows.push(rec);continue;}
    var ovIn=seen.find(function(x){if(x.empCode!==em.code)return false;return!(ret<x.departDate||dep>x.returnDate);});
    if(ovIn){rec.issue='تداخل داخل الملفات';_importRows.push(rec);continue;}

function _tge(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tgSend(token,chat,text,cb){
  if(!token||!chat){if(cb)cb(false,'توكن/معرّف غير مضبوط');return;}
  if(text&&text.length>4050)text=text.slice(0,4000)+'\n…';
  var form=new FormData();
  form.append('chat_id',chat);
  form.append('text',text);
  form.append('parse_mode','HTML');
  form.append('disable_web_page_preview','true');
  fetch('https://api.telegram.org/bot'+token.trim()+'/sendMessage',{
    method:'POST',
    body:form
  }).then(function(r){return r.json();}).then(function(j){if(cb)cb(!!(j&&j.ok),(j&&j.ok)?'':((j&&j.description)||'فشل'));}).catch(function(e){if(cb)cb(false,String(e));});
}}function testTelegram(){
  var token=((document.getElementById('tg-token')||{}).value||'').trim();
  var chat=((document.getElementById('tg-chat')||{}).value||'').trim();
  if(!token||!chat){showToast('أدخل التوكن ومعرّف الجروب أولاً','error');return;}
  tgSend(token,chat,'✅ <b>اختبار اتصال — Cairo 3A Poultry</b>\nتم ربط تيليجرام بنجاح.',function(ok,err){if(ok)showToast('✅ تم الإرسال — راجع الجروب','success');else showToast('⚠ فشل: '+err,'error');});
}
function buildTripTgReport(t){
  var rt=gRt(t.routeId),tt=(t.tripType==='return')?'عودة':'نزول';
  var vt1=gVeh(t.vehicleTypeId),nv1=+t.numVehicles||1,cpd1=+t.costPerDay||0;
  var vt2=t.veh2TypeId?gVeh(t.veh2TypeId):null,nv2=+t.numVehicles2||0;
  var cpd2=(vt2&&nv2>0)?(gVC(t.veh2TypeId,t.routeId)||vt2.dailyCost||0):0;
  var carCost=+t.vehicleTotalCost||(nv1*cpd1+nv2*cpd2);
  var tkCost=+t.ticketTotalCost||0,total=+t.totalCost||(carCost+tkCost);
  var carEmps=t.empCodes||[],tkEmps=t.ticketEmployees||[];
  var cpe=carEmps.length?Math.round(carCost/carEmps.length):0;
  var seats=(vt1.capacity||0)*nv1+(vt2?(vt2.capacity||0)*nv2:0);
  var occ=carEmps.length,wasted=Math.max(0,seats-occ);
  var seatCost=seats>0?Math.round(carCost/seats):0,wastedCost=wasted*seatCost;
  var util=seats>0?Math.round(occ/seats*100):0;
  function grp(codes){var m={},o=[];codes.forEach(function(c){var sid=gEffSec(c,t);if(!m[sid]){m[sid]=[];o.push(sid);}m[sid].push(gEmp(c).name||c);});return{m:m,o:o};}
  var L=[];
  L.push('🚐 <b>رحلة '+tt+' جديدة</b>');
  L.push('🛣 الخط: <b>'+_tge(rt.name||'-')+'</b>');
  L.push('📅 التاريخ: <b>'+fmt(t.departDate)+'</b>');
  L.push('👤 بواسطة: <b>'+_tge(t.assignedBy||'-')+'</b>');
  var v='🚗 السيارات\n• '+_tge(vt1.name||'')+' ×'+nv1+' (سعة '+(vt1.capacity||0)+') — '+EGP(nv1*cpd1);
  if(vt2&&nv2>0)v+='\n• '+_tge(vt2.name||'')+' ×'+nv2+' (سعة '+(vt2.capacity||0)+') — '+EGP(nv2*cpd2);
  L.push('<pre>'+v+'</pre>');
  L.push('<pre>💰 التكاليف\nسيارات: '+EGP(carCost)+(tkCost?('\nتذاكر: '+EGP(tkCost)):'')+'\nالإجمالي: '+EGP(total)+'\nتكلفة الموظف: '+EGP(cpe)+'</pre>');
  L.push('<pre>💸 تحليل الهدر\nالمقاعد: '+seats+'  |  المشغول: '+occ+'  |  الفاضي: '+wasted+'\nتكلفة المقعد: '+EGP(seatCost)+'\nقيمة الهدر: '+EGP(wastedCost)+'\nنسبة الإشغال: '+util+'%</pre>');
  L.push('👥 <b>الركاب ('+tt+') حسب القطاع</b>');
  var g=grp(carEmps);
  if(!g.o.length)L.push('— لا يوجد ركاب سيارة —');
  g.o.forEach(function(sid){var sec=gSec(sid);L.push('🔹 <b>'+_tge(sec.name||'قطاع')+'</b> ('+g.m[sid].length+')');g.m[sid].forEach(function(nm,i){L.push((i+1)+'. '+_tge(nm));});});
  if(tkEmps.length){L.push('🎫 <b>ركاب التذاكر ('+tkEmps.length+')</b>');var gt=grp(tkEmps);gt.o.forEach(function(sid){var sec=gSec(sid);L.push('🔹 <b>'+_tge(sec.name||'قطاع')+'</b> ('+gt.m[sid].length+')');gt.m[sid].forEach(function(nm,i){L.push((i+1)+'. '+_tge(nm));});});}
  return L.join('\n');
}
function tgSendTripReport(t){
  var st=S.settings||{};var token=st.telegramBotToken,chat=st.telegramChatId;
  if(!token||!chat)return;
  try{var msg=buildTripTgReport(t);}catch(e){return;}
  tgSend(token,chat,msg,function(ok,err){if(ok)showToast('📤 تم إرسال تقرير الرحلة لتيليجرام','success');else showToast('⚠ تعذّر إرسال تيليجرام: '+err,'error');});
}

    '<div class="fgrid">'+

function saveCostSector(bkId){

    });
  });

<script>
// ══ TRIPS PAGE — نظيف بدون تكرار ══════════════════════════════════

function clearTFilter(){var d=document.getElementById('td');if(d)d.value='';fTrips();}

function fTrips(){
  var s=(document.getElementById('ts')||{}).value||'';
  var secF=(document.getElementById('tsec')||{}).value||'';
  var dateF=(document.getElementById('td')||{}).value||'';
  var typeF=(document.getElementById('ttype')||{}).value||'';
  var today=tod();
  var groups={};
  S.trips.forEach(function(t){
    var key=String(t.id);
    if(!groups[key]) groups[key]={trip:t,sectorCards:[]};
  });
  Object.values(groups).forEach(function(g){
    var t=g.trip;
    var allSectors={};
    (t.empCodes||[]).concat(t.ticketEmployees||[]).forEach(function(c){var s=gEffSec(c,t);if(s)allSectors[s]=true;});
    (t.extraSectorIds||[]).forEach(function(sid){allSectors[+sid]=true;});
    Object.keys(allSectors).forEach(function(sid){
      sid=+sid;
      var sec=gSec(sid);
      var carEmps=(t.empCodes||[]).filter(function(c){return gEffSec(c,t)===sid;});
      var tkEmps=(t.ticketEmployees||[]).filter(function(c){return gEffSec(c,t)===sid;});
      g.sectorCards.push({sec:sec,carEmps:carEmps,tkEmps:tkEmps,sid:sid,isMerged:(t.extraSectorIds||[]).indexOf(sid)>-1});
    });
  });
  var filtered=Object.values(groups).filter(function(g){
    var t=g.trip,rt=gRt(t.routeId);
    if(typeF&&(t.tripType||'depart')!==typeF) return false;
    if(dateF&&t.departDate!==dateF) return false;
    if(secF&&!g.sectorCards.some(function(sc){return String(sc.sid)===String(secF);})) return false;
    if(s){var q=s.toLowerCase();var empMatch=(t.empCodes||[]).concat(t.ticketEmployees||[]).some(function(c){var em=gEmp(c);return(em.name||'').toLowerCase().includes(q)||(c||'').includes(q);});if(!(rt.name||'').toLowerCase().includes(q)&&!empMatch)return false;}
    return true;
  });
  filtered.sort(function(a,b){return b.trip.departDate>a.trip.departDate?1:b.trip.departDate<a.trip.departDate?-1:0;});
  var h='';
  if(!filtered.length){h='<div class="empty" style="padding:40px">لا توجد رحلات</div>';}
  else{
    filtered.forEach(function(g){
      var t=g.trip,rt=gRt(t.routeId),vt=gVeh(t.vehicleTypeId);
      var isReturn=(t.tripType||'depart')==='return';
      var isActive=t.departDate>=today;
      var tkCount=(t.ticketEmployees||[]).length;
      h+='<div class="card" style="margin-bottom:14px">';
      h+='<div class="ch">';
      h+='<div style="display:flex;align-items:center;gap:12px;flex:1;flex-wrap:wrap">';
      h+='<div style="font-size:22px">'+(isReturn?'↩':'🚀')+'</div>';
      h+='<div><div style="font-size:15px;font-weight:900">'+(rt.name||'')+'</div>';
      h+='<div style="font-size:11px;color:var(--txt3)">📅 '+fmt(t.departDate)+'  •  '+(vt.name?vt.icon+' '+vt.name:'')+'  •  '+t.numVehicles+' سيارة</div></div>';
      h+=(isReturn?'<span class="badge b-am">↩ عودة</span>':'<span class="badge b-b">🚀 نزول</span>');
      h+=(isActive?'<span class="badge b-g">🟢 نشطة</span>':'<span class="badge" style="background:#fee2e2;color:#dc2626;border-color:#fecaca">✓ منتهية</span>');
      h+='</div>';
      h+='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">';
      if(tkCount)h+='<span class="badge b-tk">🎫 '+tkCount+'</span>';
      h+='<span class="chip">💰 '+EGP(t.totalCost)+'</span>';
      h+='<button class="btn btn-pu btn-sm" onclick="pdfTripPublic('+t.id+')">📋 تقرير</button>';
      h+=pBtn('trips','edit','<button class="btn btn-pr btn-sm" onclick="openTriMod('+t.id+')">✏</button>');
      h+=pBtn('trips','delete','<button class="btn btn-no btn-sm" onclick="delTrip('+t.id+')">🗑</button>');
      h+='</div></div>';
      h+='<div class="cb"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:11px;padding:4px 0">';
      var cards=secF?g.sectorCards.filter(function(sc){return String(sc.sid)===String(secF);}):g.sectorCards;
      cards.forEach(function(sc){
        var sec=sc.sec||{};
        h+='<div style="border:1.5px solid '+(sec.color||'#ddd')+'40;border-radius:12px;padding:11px;background:'+(sec.bg||'var(--bg)')+'50">';

+'<div class="fg"><label>نوع السيارة الثانية</label><select id="tri-vt2" onchange="calcTriCost()"><option value="0">— بدون سيارة ثانية —</option>'+S.vehicleTypes.map(function(v){return'<option value="'+v.id+'"'+(t&&t.veh2TypeId===v.id?' selected':'')+'>'+v.icon+' '+v.name+'</option>';}).join('')+'</select></div>'
+'<div class="fg"><label>عدد السيارات الثانية</label><input type="number" id="tri-nv2" value="'+(t&&t.numVehicles2?t.numVehicles2:0)+'" min="0" oninput="calcTriCost()"/></div>'
    +'<div class="fg"><label>تكلفة السيارة/يوم</label><input type="number" id="tri-cpd" value="'+(t?t.costPerDay||'':'')+'" oninput="calcTriCost()" placeholder="تلقائي"/></div>'
    +'<div class="fg"><label>تكلفة التذكرة/موظف</label><input type="number" id="tri-tkc" value="'+(t?t.ticketCostPerEmp||'':'')+'" oninput="calcTriCost()"/></div>'
    +'<div class="fg"><label>عُيِّن بواسطة</label><input id="tri-by" value="'+(t?t.assignedBy:(S.user?S.user.username:'admin'))+'"/></div>'
    +'<div class="fg full"><label>قطاعات مدمجة (اختياري)</label><select id="tri-extra" multiple style="height:65px">'+mergedOpts+'</select>'
    +'<div style="font-size:10px;color:var(--txt3);margin-top:2px">Ctrl+click للتعدد</div></div>'
    +'</div>'
    +'<div style="background:var(--bg);border:1.5px solid var(--bdr);border-radius:11px;padding:11px;margin-bottom:12px" id="tri-cost-preview"></div>'
    +'<div style="font-size:11px;font-weight:800;color:var(--txt3);margin-bottom:8px;text-transform:uppercase">'
    +(isReturn?'📥 موظفو العودة في هذا اليوم':'📤 موظفو النزول في هذا اليوم')
    +'</div>'
    +'<div id="emp-rows-container"><div class="al al-b">اختر تاريخ الرحلة لتحميل الموظفين</div></div>';
  showModal((t?'✏ تعديل':'🚌 إضافة')+' رحلة '+(isReturn?'عودة':'نزول'),body,
    '<button class="btn btn-g" onclick="closeModal()">إلغاء</button><button class="btn btn-r" id="tri-save-btn" onclick="saveTrip('+(t?t.id:'null')+')">💾 حفظ الرحلة</button>',
    true);
  setTimeout(function(){loadTripEmps(t);calcTriCost();},80);
}

function loadTripEmps(existingTrip){
  var tripDate=(document.getElementById('tri-dep')||{}).value||'';
  var tripType=(document.getElementById('tri-type')||{}).value||'depart';
  var isReturn=tripType==='return';
  var selectedRouteId=+(document.getElementById('tri-rt')||{}).value||0;
  var container=document.getElementById('emp-rows-container');
  if(!container) return;
  if(!tripDate){container.innerHTML='<div class="al al-b">اختر تاريخ الرحلة أولاً</div>';return;}

  var existCarCodes=existingTrip?(existingTrip.empCodes||[]):[];
  var existTkCodes=existingTrip?(existingTrip.ticketEmployees||[]):[];
  var existingTripId=existingTrip?existingTrip.id:null;

  // ══ الموظفون المعيّنون مسبقاً في رحلات أخرى في نفس اليوم (استبعادهم) ══
  var alreadyAssigned={};
  S.trips.forEach(function(t){
    // تخطّ الرحلة الحالية عند التعديل
    if(existingTripId && t.id===existingTripId) return;
    // فقط الرحلات بنفس اليوم ونفس النوع
    if(t.departDate!==tripDate) return;
    if((t.tripType||'depart')!==tripType) return;
    (t.empCodes||[]).forEach(function(c){alreadyAssigned[String(c)]=true;});
    (t.ticketEmployees||[]).forEach(function(c){alreadyAssigned[String(c)]=true;});
  });

  // ══ حجوزات مقبولة في هذا اليوم ══
  var eligibleBks=S.bookings.filter(function(b){
    if(b.status==='rejected') return false;
    var dateMatch=isReturn?(b.returnDate===tripDate):(b.departDate===tripDate);
    if(!dateMatch) return false;
    // فلترة حسب خط السير (للعودة نستخدم خط العودة إن اختُلِف عن النزول)
    var effRt=(isReturn&&b.returnRouteId)?b.returnRouteId:b.routeId;
    if(selectedRouteId && effRt!==selectedRouteId) return false;
    return true;
  });

  // بناء قائمة الموظفين المؤهلين
  var secMap={};
  var skippedAssigned=[];

  eligibleBks.forEach(function(b){
    var code=String(b.empCode);
    var em=gEmp(code);if(!em||!em.name)return;
    // موظف معيّن في رحلة أخرى؟
    if(alreadyAssigned[code]){
      // إذا كان في الرحلة الحالية (تعديل) نُظهره
      if(existCarCodes.indexOf(code)<0 && existTkCodes.indexOf(code)<0){
        skippedAssigned.push(em);
        return;
      }
    }
    var sid=em.sectorId||0;
    if(tripType==='return'&&b.returnCostSectorId)sid=+b.returnCostSectorId;
    else if(tripType==='depart'&&b.departCostSectorId)sid=+b.departCostSectorId;
    if(!secMap[sid])secMap[sid]=[];
    // تجنب التكرار
    if(secMap[sid].some(function(x){return x.code===code;})) return;
    secMap[sid].push({em:em,code:code,bk:b,rt:gRt(b.routeId)});
  });

  // أضف موظفي الرحلة الحالية (تعديل) إن لم يظهروا
  existCarCodes.concat(existTkCodes).forEach(function(code){
    var em=gEmp(code);if(!em||!em.name)return;
    var bk=S.bookings.find(function(b){return String(b.empCode)===String(code)&&(tripType==='return'?b.returnDate===tripDate:b.departDate===tripDate);})||S.bookings.find(function(b){return String(b.empCode)===String(code)&&b.departDate===tripDate;});
    var sid=em.sectorId||0;
    if(bk){if(tripType==='return'&&bk.returnCostSectorId)sid=+bk.returnCostSectorId;else if(tripType==='depart'&&bk.departCostSectorId)sid=+bk.departCostSectorId;}
    if(!secMap[sid])secMap[sid]=[];
    if(secMap[sid].some(function(x){return x.code===code;})) return;
    secMap[sid].push({em:em,code:code,bk:bk||null,rt:bk?gRt(bk.routeId):{}});
  });

  var hasEmps=Object.keys(secMap).some(function(sid){return secMap[sid]&&secMap[sid].length>0;});

  if(!hasEmps){
    var msg='<div class="al al-y" style="margin-bottom:10px">⚠️ لا يوجد موظفون متاحون';
    if(selectedRouteId) msg+=' في خط السير المحدد';
    msg+=' لهذا التاريخ</div>';
    if(skippedAssigned.length){
      msg+='<div class="al" style="background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8;margin-bottom:10px">ℹ️ '
        +skippedAssigned.length+' موظف تم تعيينهم في رحلة أخرى بنفس اليوم: '
        +skippedAssigned.slice(0,5).map(function(e){return e.name;}).join('، ')
        +(skippedAssigned.length>5?'...':'')+'</div>';
    }
    msg+='<div style="display:flex;gap:8px"><input id="manual-code" placeholder="أضف كود موظف يدوياً..." style="flex:1;background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;padding:7px 11px;font-size:12px;outline:none;font-family:inherit"/><button class="btn btn-r btn-sm" onclick="addManualEmp()">+ إضافة</button></div>'
      +'<div id="manual-emp-list" style="margin-top:8px"></div>';
    container.innerHTML=msg;
    return;
  }

  var html='';

  // تنبيه بالموظفين المستبعدين
  if(skippedAssigned.length){
    html+='<div class="al" style="background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8;margin-bottom:10px;font-size:11px">'
      +'ℹ️ تم استبعاد '+skippedAssigned.length+' موظف لتعيينهم في رحلة أخرى بنفس اليوم: '
      +skippedAssigned.slice(0,6).map(function(e){return'<b>'+e.name+'</b>';}).join('، ')
      +(skippedAssigned.length>6?'...':'')+'</div>';
  }

  S.sectors.forEach(function(sec){
    var emps=secMap[sec.id];if(!emps||!emps.length)return;
    html+='<div style="margin-bottom:11px;border:1.5px solid '+sec.color+'40;border-radius:11px;overflow:hidden">';
    html+='<div style="background:'+sec.bg+';padding:8px 12px;font-weight:800;color:'+sec.color+';display:flex;align-items:center;gap:8px">'+sec.ico+' '+sec.name+' <span style=\"font-size:11px;font-weight:600\">('+emps.length+')</span>';
    html+='<label style="margin-right:auto;font-size:10px;font-weight:600;color:var(--txt3);cursor:pointer"><input type="checkbox" class="sec-all-car" data-sec="'+sec.id+'" onchange="toggleSecAll(this,\'car\')"> الكل 🚌</label>';
    html+='<label style="font-size:10px;font-weight:600;color:var(--txt3);cursor:pointer"><input type="checkbox" class="sec-all-tk" data-sec="'+sec.id+'" onchange="toggleSecAll(this,\'ticket\')"> الكل 🎫</label>';
    html+='</div><div style="padding:9px 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:5px">';
    emps.forEach(function(item){
      var isCar=existCarCodes.indexOf(item.code)>-1;
      var isTk=existTkCodes.indexOf(item.code)>-1;
      html+='<div style="display:flex;align-items:flex-start;gap:6px;padding:6px 8px;background:var(--bg);border-radius:8px;border:1px solid var(--bdr)">';
      html+='<div style="flex:1;min-width:0">';
      html+='<div style="font-size:11.5px;font-weight:700">'+item.em.name+'</div>';
      html+='<div style="font-size:9.5px;color:var(--txt3)">'+item.em.code+(item.rt&&item.rt.name?' · <span style=\"color:var(--R)\">'+item.rt.name+'</span>':'')+'</div>';
      if(item.bk)html+='<div style="font-size:9px;color:var(--green)">'+fmt(item.bk.departDate)+' → '+fmt(item.bk.returnDate)+'</div>';
      html+='</div>';
      html+='<label style="display:flex;flex-direction:column;align-items:center;font-size:9px;color:var(--R);cursor:pointer;gap:2px"><input type="checkbox" class="emp-car" data-sec="'+sec.id+'" data-code="'+item.code+'"'+(isCar?' checked':'')+' onchange="autoUncheckTk(this);calcTriCost()">🚌</label>';
      html+='<label style="display:flex;flex-direction:column;align-items:center;font-size:9px;color:var(--purple);cursor:pointer;gap:2px"><input type="checkbox" class="emp-tk" data-sec="'+sec.id+'" data-code="'+item.code+'"'+(isTk?' checked':'')+' onchange="autoUncheckCar(this);calcTriCost()">🎫</label>';
      html+='</div>';
    });
    html+='</div></div>';
  });

  html+='<div style="margin-top:8px;padding:9px;background:var(--bg);border:1.5px dashed var(--bdr);border-radius:10px">';
  html+='<div style="font-size:10px;font-weight:700;color:var(--txt3);margin-bottom:6px">➕ إضافة يدوي بالكود</div>';
  html+='<div style="display:flex;gap:7px"><input id="manual-code" placeholder="كود الموظف..." style="flex:1;background:var(--card);border:1.5px solid var(--bdr);border-radius:8px;padding:6px 10px;font-size:12px;outline:none;font-family:inherit"/><button class="btn btn-r btn-sm" onclick="addManualEmp()">+ إضافة</button></div>';
  html+='<div id="manual-emp-list"></div></div>';
  container.innerHTML=html;
  calcTriCost();
}

function addManualEmp(){
  var inp=document.getElementById('manual-code');if(!inp)return;
  var code=inp.value.trim();if(!code){showToast('أدخل كود الموظف','error');return;}
  var em=gEmp(code);if(!em||!em.name){showToast('الموظف غير موجود: '+code,'error');return;}
  if(document.querySelector('.emp-car[data-code="'+code+'"]')){showToast('الموظف موجود بالفعل','error');return;}
  var listEl=document.getElementById('manual-emp-list');if(!listEl)return;
  var div=document.createElement('div');
  div.style.cssText='display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr2);margin-top:5px';
  div.innerHTML='<span style="flex:1;font-size:12px;font-weight:700">'+em.name+' <span style="font-size:10px;color:var(--txt3)">'+code+'</span></span>'
    +'<label style="font-size:9px;color:var(--R);cursor:pointer"><input type="checkbox" class="emp-car" data-code="'+code+'" data-sec="'+(em.sectorId||0)+'" checked onchange="autoUncheckTk(this);calcTriCost()">🚌</label>'
    +'<label style="font-size:9px;color:var(--purple);cursor:pointer"><input type="checkbox" class="emp-tk" data-code="'+code+'" data-sec="'+(em.sectorId||0)+'" onchange="autoUncheckCar(this);calcTriCost()">🎫</label>'
    +'<button onclick="this.parentNode.remove();calcTriCost()" style="background:none;border:none;cursor:pointer;color:var(--R);font-size:14px;padding:0 4px">✕</button>';
  listEl.appendChild(div);
  inp.value='';calcTriCost();
}

function toggleSecAll(cb,type){
  var sec=cb.getAttribute('data-sec');
  var cls=type==='car'?'.emp-car':'.emp-tk';
  var opp=type==='car'?'.emp-tk':'.emp-car';
  document.querySelectorAll(cls+'[data-sec="'+sec+'"]').forEach(function(c){c.checked=cb.checked;});
  if(cb.checked)document.querySelectorAll(opp+'[data-sec="'+sec+'"]').forEach(function(c){c.checked=false;});
  calcTriCost();
}
function autoUncheckTk(cb){if(cb.checked){var c=cb.getAttribute('data-code');document.querySelectorAll('.emp-tk[data-code="'+c+'"]').forEach(function(x){x.checked=false;});}}
function autoUncheckCar(cb){if(cb.checked){var c=cb.getAttribute('data-code');document.querySelectorAll('.emp-car[data-code="'+c+'"]').forEach(function(x){x.checked=false;});}}

function calcTriCost(){
  var nv=+(document.getElementById('tri-nv')||{}).value||1;
  var cpd=+(document.getElementById('tri-cpd')||{}).value||0;
  var tkc=+(document.getElementById('tri-tkc')||{}).value||0;
  var nv2=+(document.getElementById('tri-nv2')||{}).value||0;
  var vt2Id=+(document.getElementById('tri-vt2')||{}).value||0;
  if(!cpd){var vtEl=document.getElementById('tri-vt');if(vtEl){var vt=gVeh(+vtEl.value);if(vt.dailyCost)cpd=vt.dailyCost;}}
  var cpd2=0;
  if(vt2Id&&nv2>0){cpd2=gVC(vt2Id,(+(document.getElementById('tri-rt')||{}).value)||0)||gVeh(vt2Id).dailyCost||0;}
  var carEmps=document.querySelectorAll('.emp-car:checked').length;
  var tkEmps=document.querySelectorAll('.emp-tk:checked').length;
  var carCost1=nv*cpd, carCost2=nv2*cpd2, carCostTotal=carCost1+carCost2;
  var tkCost=tkEmps*tkc, cpe=carEmps>0?Math.round(carCostTotal/carEmps):0;
  var el=document.getElementById('tri-cost-preview');
  if(el)el.innerHTML='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px;text-align:center">'
    +'<div><div style="font-size:10px;color:var(--txt3)">موظفو سيارة</div><div style="font-weight:900;font-size:17px;color:var(--R)">'+carEmps+'</div></div>'
    +'<div><div style="font-size:10px;color:var(--txt3)">تكلفة السيارات'+(carCost2>0?' (نوعين)':'')+'</div><div style="font-weight:900;font-size:17px;color:var(--R)">'+EGP(carCostTotal)+(carCost2>0?'<div style="font-size:9px;color:var(--txt3)">'+EGP(carCost1)+' + '+EGP(carCost2)+'</div>':'')+'</div></div>'
    +'<div><div style="font-size:10px;color:var(--txt3)">تكلفة التذاكر</div><div style="font-weight:900;font-size:17px;color:var(--purple)">'+EGP(tkCost)+'</div></div>'
    +'<div><div style="font-size:10px;color:var(--txt3)">الإجمالي</div><div style="font-weight:900;font-size:17px;color:var(--green)">'+EGP(carCostTotal+tkCost)+'</div></div>'
    +'</div>';
}
function saveTrip(tripId){
  if(!canDo('trips',tripId?'edit':'add')){showToast('🔒 لا تملك الصلاحية','error');return;}
  var btn=document.getElementById('tri-save-btn');
  var rtId=+(document.getElementById('tri-rt')||{}).value||0;
  var vtId=+(document.getElementById('tri-vt')||{}).value||0;
  var dep=(document.getElementById('tri-dep')||{}).value||'';
  var nv=+(document.getElementById('tri-nv')||{}).value||1;
  var cpd=+(document.getElementById('tri-cpd')||{}).value||0;
  var tkc=+(document.getElementById('tri-tkc')||{}).value||0;
  var assignedBy=(document.getElementById('tri-by')||{}).value||'admin';
  var nv2El=document.getElementById('tri-nv2');
  var vt2El=document.getElementById('tri-vt2');
  var nv2=nv2El?+nv2El.value||0:0;
  var vt2Id=vt2El?+vt2El.value||0:0;
  var tripType=(document.getElementById('tri-type')||{}).value||'depart';
  if(!rtId||!vtId||!dep){showToast('يرجى ملء: خط السير، نوع السيارة، التاريخ','error');return;}
  if(!cpd){var vt=gVeh(vtId);if(vt.dailyCost)cpd=vt.dailyCost;}
  var cpd2=0;
  if(vt2Id&&nv2>0){cpd2=gVC(vt2Id,rtId)||gVeh(vt2Id).dailyCost||0;}
  var extraEl=document.getElementById('tri-extra');
  var extraSectorIds=[];
  if(extraEl)Array.from(extraEl.selectedOptions).forEach(function(o){if(o.value)extraSectorIds.push(+o.value);});
  var empCodes=[],ticketEmployees=[];
  var seenCar={},seenTk={};
  document.querySelectorAll('.emp-car:checked').forEach(function(c){var code=c.getAttribute('data-code');if(code&&!seenCar[code]){empCodes.push(code);seenCar[code]=true;}});
  document.querySelectorAll('.emp-tk:checked').forEach(function(c){var code=c.getAttribute('data-code');if(code&&!seenTk[code]){ticketEmployees.push(code);seenTk[code]=true;}});
  var carCost=(nv*cpd)+(nv2*cpd2),tkCost=ticketEmployees.length*tkc;
  var cpe=empCodes.length>0?Math.round(carCost/empCodes.length):0;
  var data={
    routeId:rtId,vehicleTypeId:vtId,
    departDate:dep,returnDate:dep,
    days:1,numVehicles:nv,
    costPerDay:cpd,
    veh2TypeId:vt2Id,
    numVehicles2:nv2,
    vehicleTotalCost:carCost,vehicleCostPerEmp:cpe,
    totalCost:carCost+tkCost,
    ticketTotalCost:tkCost,ticketCostPerEmp:tkc,
    costPerEmp:cpe,
    empCodes:empCodes,ticketEmployees:ticketEmployees,
    extraSectorIds:extraSectorIds,
    assignedBy:assignedBy,
    tripType:tripType,
    notes:tripType==='return'?'عودة':'نزول'
  };
  if(tripId) data.id=tripId;
  if(btn){btn.disabled=true;btn.textContent='⏳ جارٍ الحفظ...';}
  google.script.run
    .withSuccessHandler(function(r){
      if(btn){btn.disabled=false;btn.textContent='💾 حفظ الرحلة';}
      if(r&&r.success){showToast('✅ تم الحفظ بنجاح','success');try{tgSendTripReport(data);}catch(e){}closeModal();rfsh(function(){fTrips();});}
      else showToast('خطأ: '+(r?r.message:'فشل الحفظ'),'error');
    })
    .withFailureHandler(function(err){
      if(btn){btn.disabled=false;btn.textContent='💾 حفظ الرحلة';}
      showToast('خطأ: '+String(err),'error');
    })
    .saveTrip(data);
}
function delTrip(id){
  if(!canDo('trips','delete')){showToast('🔒 لا تملك صلاحية الحذف','error');return;}
  if(!confirm('هل تريد حذف هذه الرحلة؟'))return;
  call('deleteTrip',[id],function(r){
    if(r.success){showToast('✅ تم الحذف','success');rfsh(function(){fTrips();});}
    else showToast('خطأ: '+r.message,'error');
  });
}

// ══ تقرير الموظفين (بدون تكاليف) مع بحث عن مشرف ══

  h+='<div class="fg full" style="margin-bottom:12px"><label>🔍 البحث عن مشرف الرحلة</label>'
    +'<input id="sup-search" placeholder="ابحث بالاسم أو الكود..." oninput="filterSupSearch()" style="width:100%;background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;padding:8px 12px;font-size:13px;outline:none;font-family:inherit"/>'
    +'<div id="sup-results" style="max-height:150px;overflow-y:auto;border:1.5px solid var(--bdr);border-radius:9px;margin-top:5px;background:var(--card)"></div>'
    +'<div style="margin-top:7px;font-size:12px;color:var(--txt3)">المشرف المختار: <b id="sup-selected-name">—</b></div>'
    +'<input type="hidden" id="sup-selected-code" value=""/></div>';
  h+='<div style="font-size:12px;color:var(--txt3)">إجمالي الموظفين: <b>'+allCodes.length+'</b></div>';
  showModal('📋 تقرير رحلة',h,'<button class="btn btn-g" onclick="closeModal()">إغلاق</button><button class="btn btn-pu" onclick="doPdfTripPublic('+tripId+')">📄 تصدير PDF</button>',false);
  setTimeout(function(){filterSupSearch();},60);
}
function filterSupSearch(){
  var q=((document.getElementById('sup-search')||{}).value||'').toLowerCase();
  var results=S.employees.filter(function(e){return !q||(e.name||'').toLowerCase().includes(q)||(e.code||'').toLowerCase().includes(q);}).slice(0,15);

// دالة مساعدة: إنشاء جدول بيانات من Chart
function _chartDataTable(canvasId, title){
  try{
    var chart=Chart.getChart(canvasId);
    if(!chart) return '';
    var ds=chart.data.datasets, labels=chart.data.labels||[];
    if(!labels.length) return '';
    var html='<div class="pdf-chart-data"><div class="pdf-chart-data-title">📊 '+title+'</div>';
    html+='<table class="pdf-data-table"><thead><tr><th>البيان</th>';
    ds.forEach(function(d){html+='<th>'+d.label+'</th>';});
    html+='</tr></thead><tbody>';
    labels.forEach(function(lbl,i){
      html+='<tr><td style="font-weight:700">'+lbl+'</td>';
      ds.forEach(function(d){
        var v=d.data[i];
        var fmt_v=(typeof v==='number'&&v>1000)?EGP(v):(v||'—');
        html+='<td style="text-align:center">'+fmt_v+'</td>';
      });
      html+='</tr>';
    });
    html+='</tbody></table></div>';
    return html;
  }catch(e){return '';}
}

function pdfBudgetDash(){
  var secF=(document.getElementById('bdsh-sec')||{}).value||'';
  var yr=+(document.getElementById('bdsh-yr')||{}).value||new Date().getFullYear();
  var sectors=secF?S.sectors.filter(function(s){return s.id==secF;}):S.sectors;
  var title='داشبورد الميزانية — '+yr;

  function getBudget(secId,mo){var mb=S.budgets.find(function(b){return b.sectorId===secId&&b.year===yr&&b.month===mo;});return mb?mb.amount:0;}
  function getCarActual(secId,mo){return S.trips.filter(function(t){var d=new Date(t.departDate+'T00:00:00');return d.getFullYear()===yr&&(d.getMonth()+1)===mo;}).reduce(function(s,t){return s+(+t.costPerEmp||0)*((t.empCodes||[]).filter(function(c){return gEffSec(c,t)===secId;}).length);},0);}
  function getTkActual(secId,mo){return S.trips.filter(function(t){var d=new Date(t.departDate+'T00:00:00');return d.getFullYear()===yr&&(d.getMonth()+1)===mo;}).reduce(function(s,t){return s+(+t.ticketCostPerEmp||0)*((t.ticketEmployees||[]).filter(function(c){return gEffSec(c,t)===secId;}).length);},0);}

  var totalBudget=0,totalCar=0,totalTk=0;
  sectors.forEach(function(sec){for(var m=1;m<=12;m++){totalBudget+=getBudget(sec.id,m);totalCar+=getCarActual(sec.id,m);totalTk+=getTkActual(sec.id,m);}});
  var totalActual=totalCar+totalTk,deviation=totalActual-totalBudget;
  var devPct=totalBudget?Math.round(Math.abs(deviation)/totalBudget*100):0;

  // Stats
  var statsHtml='<div class="stats-grid">'
    +'<div class="stat-box"><div class="stat-ico">💵</div><div class="stat-n">'+EGP(totalBudget)+'</div><div class="stat-l">الميزانية المخططة</div><div class="stat-s">السنة '+yr+'</div></div>'
    +'<div class="stat-box"><div class="stat-ico">🚌</div><div class="stat-n">'+EGP(totalCar)+'</div><div class="stat-l">تكلفة السيارات</div><div class="stat-s">رحلات الموظفين</div></div>'
    +'<div class="stat-box"><div class="stat-ico">🎫</div><div class="stat-n">'+EGP(totalTk)+'</div><div class="stat-l">تكلفة التذاكر</div><div class="stat-s">تذاكر الباص</div></div>'
    +'<div class="stat-box"><div class="stat-ico">'+(deviation>0?'⬆':'⬇')+'</div><div class="stat-n" style="color:'+(deviation>0?'#dc2626':'#16a34a')+'">'+EGP(Math.abs(deviation))+'</div><div class="stat-l">'+(deviation>0?'تجاوز الميزانية':'توفير')+'</div><div class="stat-s">'+devPct+'% انحراف</div></div>'
    +'</div>';

  // Charts as images + data tables
  var chartsHtml='<div class="section-title">📊 الرسومات البيانية</div>'
    +'<div class="charts-grid-3">'
    +_canvasToImg('bud-monthly','الميزانية مقابل المصروف الشهري')
    +'<div>'
    +_canvasToImg('bud-pie','توزيع المصروف')
    +'</div></div>'
    +'<div class="charts-grid">'
    +_canvasToImg('bud-dev-sec','المصروف حسب القطاع')

  // Data tables for charts
  var chartDataHtml='<div class="section-title">📋 بيانات الرسومات تفصيلياً</div>'
    +_chartDataTable('bud-monthly','الميزانية مقابل المصروف — شهرياً')
    +_chartDataTable('bud-dev-sec','المصروف حسب القطاع')
    +_chartDataTable('bud-pie','توزيع المصروف (سيارات / تذاكر)');

  // Details table
  var detailsHtml='<div class="section-title">📋 تفاصيل القطاعات — '+yr+'</div><table><thead><tr><th>القطاع</th>';
  MONTHS_AR.forEach(function(mn){detailsHtml+='<th style="font-size:8px;padding:4px 3px">'+mn+'</th>';});
  detailsHtml+='<th>ميزانية</th><th>سيارات</th><th>تذاكر</th><th>الإجمالي</th><th>الانحراف</th></tr></thead><tbody>';
  sectors.forEach(function(sec){
    var secTotBud=0,secTotCar=0,secTotTk=0;
    detailsHtml+='<tr><td style="white-space:nowrap;font-weight:700">'+sec.ico+' '+sec.name+'</td>';
    for(var m=1;m<=12;m++){
      var bud=getBudget(sec.id,m),car=getCarActual(sec.id,m),tk=getTkActual(sec.id,m),act=car+tk;
      secTotBud+=bud;secTotCar+=car;secTotTk+=tk;
      var bg='',clr='#1e293b';
      if(bud>0){var rv=act/bud;bg=rv>1?'#fee2e2':rv>0.85?'#fef3c7':'#f0fdf4';clr=rv>1?'#dc2626':rv>0.85?'#d97706':'#16a34a';}
      detailsHtml+='<td style="text-align:center;background:'+bg+';font-size:8px;padding:3px">';
      if(bud>0)detailsHtml+='<b style="color:'+clr+'">'+EGP(act)+'</b><div style="font-size:7px;color:#94a3b8">/ '+EGP(bud)+'</div>';

      +'</tr>';
  });
  detailsHtml+='</tbody></table>';

  var html=_pdfBase(title)
    +'<div class="pdf-header">'
    +'<div><div class="pdf-logo">Cairo 3A Poultry</div><div class="pdf-sub">نظام إدارة إجازات الأسطول</div></div>'
    +'<div><div class="pdf-title">📈 داشبورد الميزانية</div><div class="pdf-date">السنة: '+yr+' | طُبع: '+fmt(tod())+'</div></div>'
    +'</div>'
    +statsHtml+chartsHtml+chartDataHtml+detailsHtml
    +_pdfClose(title);

  var w=window.open('','_blank');

      +'<div class="stat-box"><div class="stat-ico">💰</div><div class="stat-n">'+EGP(totalCost)+'</div><div class="stat-l">إجمالي التكاليف</div><div class="stat-s">سيارات + تذاكر</div></div>'
      +'</div>';
    var rows='';
    S.sectors.forEach(function(sec){
      var emps=S.employees.filter(function(e){return e.sectorId===sec.id;});

      var tkCost=filtTrips.reduce(function(s,t){return s+(t.ticketEmployees||[]).filter(function(c){return emps.some(function(e){return e.code===c;});}).length*(+t.ticketCostPerEmp||0);},0);
      rows+='<tr><td style="font-weight:800"><span style="font-size:14px">'+sec.ico+'</span> <span style="color:'+sec.color+'">'+sec.name+'</span></td><td style="text-align:center;font-weight:800">'+emps.length+'</td><td style="text-align:center">'+sbks.length+'</td><td><span class="chip" style="color:#c8102e">'+EGP(cost)+'</span></td><td><span class="chip" style="color:#7c3aed">'+EGP(tkCost)+'</span></td><td><span class="chip" style="font-weight:900">'+EGP(cost+tkCost)+'</span></td></tr>';
      (sec.depts||[]).forEach(function(d){
        var de=emps.filter(function(e){return e.dept===d;});

function bindFleetRpt(){
  var frm=(document.getElementById('fr-from')||{}).value||'';
  var to=(document.getElementById('fr-to')||{}).value||tod();
  var secF=(document.getElementById('fr-sec')||{}).value||'';
  var limit=+(document.getElementById('fr-limit')||{}).value||5;

  // ── فلترة الرحلات (حسب قطاع التكلفة المحمّل عليه الحجز) ──
  var trips=S.trips.filter(function(t){
    if(frm&&t.departDate<frm)return false;
    if(to&&t.departDate>to)return false;
    if(secF){
      var hasEmp=(t.empCodes||[]).some(function(c){return gEffSec(c,t)==secF;});
      var hasTk=(t.ticketEmployees||[]).some(function(c){return gEffSec(c,t)==secF;});
      if(!hasEmp&&!hasTk)return false;
    }
    return true;
  });

  // ── فلترة الحجوزات ──
  var bks=S.bookings.filter(function(b){
    if(b.status==='rejected')return false;
    if(frm&&b.departDate<frm)return false;
    if(to&&b.departDate>to)return false;
    if(secF&&gEmp(b.empCode).sectorId!=secF)return false;
    return true;
  });

  // ════════════════════════════════════════════
  // القسم ١: كفاءة استخدام السيارات
  // ════════════════════════════════════════════
  var totalSeats=0,totalOccupied=0,totalWastedCost=0;
  var vehicleRows=[];

  trips.forEach(function(t){
    var vt=gVeh(t.vehicleTypeId);
    var cap=vt.capacity||0;
    var seats=cap*(+t.numVehicles||1);
    // السيارة الثانية
    if(t.veh2TypeId&&t.numVehicles2>0){
      var vt2=gVeh(t.veh2TypeId);
      seats+=(vt2.capacity||0)*(+t.numVehicles2);
    }
    var occupied=(t.empCodes||[]).length;
    var wasted=Math.max(0,seats-occupied);
    var seatCost=seats>0?((+t.totalCost-(+t.ticketTotalCost||0))/seats):0;
    var wastedCost=wasted*seatCost;
    totalSeats+=seats;
    totalOccupied+=occupied;
    totalWastedCost+=wastedCost;
    if(wasted>0){
      vehicleRows.push({
        t:t,vt:vt,seats:seats,occupied:occupied,
        wasted:wasted,seatCost:seatCost,wastedCost:wastedCost
      });
    }
  });
  vehicleRows.sort(function(a,b){return b.wastedCost-a.wastedCost;});
  var utilPct=totalSeats>0?Math.round(totalOccupied/totalSeats*100):0;

  // ════════════════════════════════════════════
  // القسم ٢: موظفون بسيارة وتذكرة في نفس الفترة
  // ════════════════════════════════════════════
  var dupMap={};
  trips.forEach(function(t){
    (t.empCodes||[]).forEach(function(c){
      if(!dupMap[c])dupMap[c]={car:[],tk:[]};
      dupMap[c].car.push(t);
    });
    (t.ticketEmployees||[]).forEach(function(c){
      if(!dupMap[c])dupMap[c]={car:[],tk:[]};
      dupMap[c].tk.push(t);
    });
  });
  var dupRows=[];
  Object.keys(dupMap).forEach(function(code){
    var d=dupMap[code];
    if(!d.car.length||!d.tk.length)return;
    // تحقق من تداخل الفترات
    d.car.forEach(function(ct){
      d.tk.forEach(function(tt){
        var overlap=!(ct.returnDate<tt.departDate||ct.departDate>tt.returnDate);
        if(!overlap)return;
        // تحقق من عدم التكرار
        var key=code+'_'+ct.id+'_'+tt.id;
        if(dupRows.some(function(r){return r.key===key;}))return;
        dupRows.push({
          key:key,code:code,
          carTrip:ct,tkTrip:tt,
          carCost:+ct.costPerEmp||0,
          tkCost:+tt.ticketCostPerEmp||0
        });
      });
    });
  });

  // ════════════════════════════════════════════
  // القسم ٣: تجاوز الحد الأقصى من النزولات
  // ════════════════════════════════════════════
  var empBkMap={};
  bks.forEach(function(b){
    var c=String(b.empCode);
    if(!empBkMap[c])empBkMap[c]=[];
    empBkMap[c].push(b);
  });
  var overLimitRows=[];
  Object.keys(empBkMap).forEach(function(code){
    var empBks=empBkMap[code].sort(function(a,b){return a.departDate>b.departDate?1:-1;});
    if(empBks.length<=limit)return;
    // التكلفة الزائدة = تكاليف الرحلات بعد الحد
    var overBks=empBks.slice(limit);
    var overCost=0;
    overBks.forEach(function(b){
      var effectiveRt=b.returnRouteId?b.returnRouteId:b.routeId;
      var ct=S.trips.find(function(t){
        return(t.empCodes||[]).indexOf(code)>-1
          &&t.routeId===effectiveRt
          &&t.departDate===b.departDate;
      });
      var tt=S.trips.find(function(t){
        return(t.ticketEmployees||[]).indexOf(code)>-1
          &&t.routeId===effectiveRt
          &&t.departDate===b.departDate;
      });
      if(ct)overCost+=(+ct.costPerEmp||0);
      if(tt)overCost+=(+tt.ticketCostPerEmp||0);
    });
    overLimitRows.push({
      code:code,total:empBks.length,
      over:overBks.length,overCost:overCost,
      bks:empBks
    });
  });
  overLimitRows.sort(function(a,b){return b.overCost-a.overCost;});

  // ════════════════════════════════════════════
  // تجميع الإحصائيات العامة
  // ════════════════════════════════════════════
  var dupTotalCost=dupRows.reduce(function(s,r){return s+r.carCost+r.tkCost;},0);
  var overTotalCost=overLimitRows.reduce(function(s,r){return s+r.overCost;},0);

  // ════════════════════════════════════════════
  // HTML الناتج
  // ════════════════════════════════════════════
  var h='';

  // بطاقات الملخص العلوي
  h+='<div class="g4" style="margin-bottom:16px">'
    +'<div class="stat" style="border:1.5px solid #fecdd3">'
    +'<div class="st-ico" style="background:#fff1f2">🚌</div>'
    +'<div class="st-n" style="color:var(--R)">'+utilPct+'%</div>'
    +'<div class="st-l">نسبة إشغال السيارات</div>'
    +'<div class="st-s">'+totalOccupied+' من '+totalSeats+' مقعد</div>'
    +'</div>'
    +'<div class="stat" style="border:1.5px solid #fde68a">'
    +'<div class="st-ico" style="background:#fef3c7">💸</div>'
    +'<div class="st-n" style="color:var(--amber)">'+EGP(totalWastedCost)+'</div>'

// ══ تصدير Excel ══
function exportFleetXLSX(){
  var frm=(document.getElementById('fr-from')||{}).value||'';
  var to=(document.getElementById('fr-to')||{}).value||tod();
  var limit=+(document.getElementById('fr-limit')||{}).value||5;
  var secF=(document.getElementById('fr-sec')||{}).value||'';

  var trips=S.trips.filter(function(t){
    if(frm&&t.departDate<frm)return false;
    if(to&&t.departDate>to)return false;
    return true;
  });
  var bks=S.bookings.filter(function(b){
    if(b.status==='rejected')return false;
    if(frm&&b.departDate<frm)return false;
    if(to&&b.departDate>to)return false;
    if(secF&&gEmp(b.empCode).sectorId!=secF)return false;
    return true;
  });

  var wb=XLSX.utils.book_new();

  // ورقة ١: كفاءة السيارات
  var rows1=[['خط السير','التاريخ','نوع السيارة','عدد السيارات','إجمالي المقاعد','الركاب','مقاعد فارغة','تكلفة/مقعد (ج.م)','تكلفة الهدر (ج.م)','% الإشغال']];
  trips.forEach(function(t){
    var vt=gVeh(t.vehicleTypeId),rt=gRt(t.routeId);
    var cap=vt.capacity||0;
    var seats=cap*(+t.numVehicles||1);
    if(t.veh2TypeId&&t.numVehicles2>0)seats+=(gVeh(t.veh2TypeId).capacity||0)*(+t.numVehicles2);
    var occ=(t.empCodes||[]).length;
    var wasted=Math.max(0,seats-occ);
    var seatCost=seats>0?((+t.totalCost-(+t.ticketTotalCost||0))/seats):0;
    rows1.push([rt.name||'',t.departDate,vt.name||'',t.numVehicles,seats,occ,wasted,Math.round(seatCost),Math.round(wasted*seatCost),seats>0?Math.round(occ/seats*100)+'%':'0%']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows1),'كفاءة_السيارات');

  // ورقة ٢: تداخل النقل
  var rows2=[['كود الموظف','اسم الموظف','القطاع','خط السيارة','تاريخ السيارة','تكلفة السيارة','خط التذكرة','تاريخ التذكرة','تكلفة التذكرة','الإجمالي']];
  var dupMap2={};
  trips.forEach(function(t){
    (t.empCodes||[]).forEach(function(c){if(!dupMap2[c])dupMap2[c]={car:[],tk:[]};dupMap2[c].car.push(t);});
    (t.ticketEmployees||[]).forEach(function(c){if(!dupMap2[c])dupMap2[c]={car:[],tk:[]};dupMap2[c].tk.push(t);});
  });
  var added={};
  Object.keys(dupMap2).forEach(function(code){
    var d=dupMap2[code];
    if(!d.car.length||!d.tk.length)return;
    d.car.forEach(function(ct){
      d.tk.forEach(function(tt){
        var overlap=!(ct.returnDate<tt.departDate||ct.departDate>tt.returnDate);
        if(!overlap)return;
        var key=code+'_'+ct.id+'_'+tt.id;
        if(added[key])return;
        added[key]=true;
        var em=gEmp(code);
        var sec=gSec(em.sectorId);
        rows2.push([code,em.name||'',sec.name||'',gRt(ct.routeId).name||'',ct.departDate,+ct.costPerEmp||0,gRt(tt.routeId).name||'',tt.departDate,+tt.ticketCostPerEmp||0,(+ct.costPerEmp||0)+(+tt.ticketCostPerEmp||0)]);
      });
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows2),'تداخل_النقل');

  // ورقة ٣: تجاوز الحد
  var rows3=[['كود الموظف','اسم الموظف','القطاع','عدد النزلات','الزيادة عن الحد ('+limit+')','تكلفة الزيادة (ج.م)']];
  var empBkMap2={};
  bks.forEach(function(b){var c=String(b.empCode);if(!empBkMap2[c])empBkMap2[c]=[];empBkMap2[c].push(b);});
  Object.keys(empBkMap2).forEach(function(code){
    var empBks=empBkMap2[code].sort(function(a,b){return a.departDate>b.departDate?1:-1;});
    if(empBks.length<=limit)return;
    var overBks=empBks.slice(limit);
    var overCost=0;
    overBks.forEach(function(b){
      var effectiveRt=b.returnRouteId?b.returnRouteId:b.routeId;
      var ct=S.trips.find(function(t){return(t.empCodes||[]).indexOf(code)>-1&&t.routeId===effectiveRt&&t.departDate===b.departDate;});
      var tt=S.trips.find(function(t){return(t.ticketEmployees||[]).indexOf(code)>-1&&t.routeId===effectiveRt&&t.departDate===b.departDate;});
      if(ct)overCost+=(+ct.costPerEmp||0);
      if(tt)overCost+=(+tt.ticketCostPerEmp||0);
    });
    var em=gEmp(code),sec=gSec(em.sectorId);
    rows3.push([code,em.name||'',sec.name||'',empBks.length,overBks.length,overCost]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows3),'تجاوز_الحد_'+limit);

  XLSX.writeFile(wb,'تقرير_كفاءة_الأسطول_'+tod()+'.xlsx');
  showToast('✅ تم تصدير التقرير','success');
}

function exportFleetPDF(){

      var ht=(t.ticketEmployees||[]).some(function(c){return gEmp(c).sectorId==secF;});
      if(!h&&!ht)return false;
    }
    return true;
  });
  var bks=S.bookings.filter(function(b){
    if(b.status==='rejected')return false;
    if(frm&&b.departDate<frm)return false;
    if(to&&b.departDate>to)return false;
    if(secF&&gEmp(b.empCode).sectorId!=secF)return false;
    return true;
  });

  // حسابات مبسطة للـ PDF
  var totalSeats=0,totalOccupied=0,totalWastedCost=0;
  var vehicleRows=[];
  trips.forEach(function(t){
    var vt=gVeh(t.vehicleTypeId);
    var seats=(vt.capacity||0)*(+t.numVehicles||1);
    if(t.veh2TypeId&&t.numVehicles2>0)seats+=(gVeh(t.veh2TypeId).capacity||0)*(+t.numVehicles2);
    var occ=(t.empCodes||[]).length;
    var wasted=Math.max(0,seats-occ);
    var seatCost=seats>0?((+t.totalCost-(+t.ticketTotalCost||0))/seats):0;
    totalSeats+=seats;totalOccupied+=occ;totalWastedCost+=wasted*seatCost;
    if(wasted>0)vehicleRows.push({t:t,vt:vt,seats:seats,occ:occ,wasted:wasted,wastedCost:Math.round(wasted*seatCost)});
  });
  vehicleRows.sort(function(a,b){return b.wastedCost-a.wastedCost;});
  var utilPct=totalSeats>0?Math.round(totalOccupied/totalSeats*100):0;

  var dupMap3={};
  trips.forEach(function(t){
    (t.empCodes||[]).forEach(function(c){if(!dupMap3[c])dupMap3[c]={car:[],tk:[]};dupMap3[c].car.push(t);});
    (t.ticketEmployees||[]).forEach(function(c){if(!dupMap3[c])dupMap3[c]={car:[],tk:[]};dupMap3[c].tk.push(t);});
  });
  var dupRows2=[];var added2={};
  Object.keys(dupMap3).forEach(function(code){
    var d=dupMap3[code];
    if(!d.car.length||!d.tk.length)return;
    d.car.forEach(function(ct){d.tk.forEach(function(tt){
      var overlap=!(ct.returnDate<tt.departDate||ct.departDate>tt.returnDate);
      if(!overlap)return;
      var key=code+'_'+ct.id+'_'+tt.id;
      if(added2[key])return;added2[key]=true;
      dupRows2.push({code:code,ct:ct,tt:tt,cost:(+ct.costPerEmp||0)+(+tt.ticketCostPerEmp||0)});
    });});
  });

  var empBkMap3={};
  bks.forEach(function(b){var c=String(b.empCode);if(!empBkMap3[c])empBkMap3[c]=[];empBkMap3[c].push(b);});
  var overRows2=[];
  Object.keys(empBkMap3).forEach(function(code){
    var empBks=empBkMap3[code].sort(function(a,b){return a.departDate>b.departDate?1:-1;});
    if(empBks.length<=limit)return;
    var overBks=empBks.slice(limit);
    var overCost=0;
    overBks.forEach(function(b){
      var er=b.returnRouteId?b.returnRouteId:b.routeId;
      var ct=S.trips.find(function(t){return(t.empCodes||[]).indexOf(code)>-1&&t.routeId===er&&t.departDate===b.departDate;});
      var tt=S.trips.find(function(t){return(t.ticketEmployees||[]).indexOf(code)>-1&&t.routeId===er&&t.departDate===b.departDate;});
      if(ct)overCost+=(+ct.costPerEmp||0);
      if(tt)overCost+=(+tt.ticketCostPerEmp||0);
    });
    overRows2.push({code:code,total:empBks.length,over:overBks.length,overCost:overCost});
  });
  overRows2.sort(function(a,b){return b.overCost-a.overCost;});
  var overTotalCost2=overRows2.reduce(function(s,r){return s+r.overCost;},0);
  var dupTotalCost2=dupRows2.reduce(function(s,r){return s+r.cost;},0);

  var barColor=utilPct>=85?'#16a34a':utilPct>=65?'#d97706':'#dc2626';

  // بناء HTML
  var vehRows='';

    var rt=gRt(r.t.routeId);
    var pct=r.seats>0?Math.round(r.occ/r.seats*100):0;

    vehRows+='<tr style="background:'+(i%2?'#f8fafc':'#fff')+'">'
      +'<td>'+rt.name+'</td><td style="direction:ltr;text-align:center">'+fmt(r.t.departDate)+'</td>'
      +'<td>'+(r.vt.name||'')+'</td><td style="text-align:center">'+r.t.numVehicles+'</td>'
      +'<td style="text-align:center;font-weight:700;color:#2563eb">'+r.seats+'</td>'
      +'<td style="text-align:center;font-weight:700;color:#16a34a">'+r.occ+'</td>'
      +'<td style="text-align:center;font-weight:700;color:#d97706">'+r.wasted+'</td>'

      +'</tr>';
  });

  var dupRowsHtml='';
  dupRows2.slice(0,20).forEach(function(r,i){
    var em=gEmp(r.code);
    dupRowsHtml+='<tr style="background:'+(i%2?'#fdf4ff':'#f5f3ff')+'">'
      +'<td style="font-family:monospace;font-weight:700;color:#c8102e">'+r.code+'</td>'
      +'<td style="font-weight:700">'+em.name+'</td>'
      +'<td style="font-size:9.5px">'+gRt(r.ct.routeId).name+'</td>'
      +'<td style="direction:ltr;text-align:center">'+fmt(r.ct.departDate)+'</td>'
      +'<td style="font-size:9.5px">'+gRt(r.tt.routeId).name+'</td>'
      +'<td style="direction:ltr;text-align:center">'+fmt(r.tt.departDate)+'</td>'
      +'<td style="font-weight:800;color:#7c3aed">'+EGP(r.cost)+'</td>'
      +'</tr>';
  });

  var overRowsHtml='';
  overRows2.slice(0,20).forEach(function(r,i){
    var em=gEmp(r.code);
    var sec=gSec(em.sectorId);
    overRowsHtml+='<tr style="background:'+(i%2?'#fff1f2':'#fee2e2')+'">'
      +'<td style="font-family:monospace;font-weight:700;color:#c8102e">'+r.code+'</td>'
      +'<td style="font-weight:700">'+em.name+'</td>'
      +'<td>'+sec.ico+' '+sec.name+'</td>'
      +'<td style="text-align:center;font-weight:900;color:#c8102e;font-size:14px">'+r.total+'</td>'
      +'<td style="text-align:center;font-weight:900;color:#dc2626;font-size:13px">+'+r.over+'</td>'
      +'<td style="font-weight:800;color:#dc2626">'+EGP(r.overCost)+'</td>'
      +'</tr>';
  });

  var html='<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"/>'
    +'<title>تقرير كفاءة الأسطول</title><style>'
    +'*{margin:0;padding:0;box-sizing:border-box}'
    +'body{font-family:Arial,sans-serif;direction:rtl;color:#1e293b;padding:20px;font-size:11px}'
    +'.header{display:flex;justify-content:space-between;border-bottom:3px solid #c8102e;padding-bottom:12px;margin-bottom:16px}'
    +'.logo{font-size:20px;font-weight:900;color:#c8102e}'
    +'.sub{font-size:9px;color:#94a3b8;margin-top:2px}'
    +'.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}'
    +'.stat{border:1.5px solid #e2e8f0;border-radius:9px;padding:10px;text-align:center;background:#f8fafc}'
    +'.sn{font-size:16px;font-weight:900}.sl{font-size:8.5px;color:#64748b;font-weight:700;margin-top:2px}'
    +'.bar-wrap{background:#e2e8f0;border-radius:99px;height:14px;overflow:hidden;margin:8px 0}'
    +'.bar{height:100%;border-radius:99px}'
    +'.section-title{font-size:13px;font-weight:800;border-right:4px solid #c8102e;padding-right:8px;margin:14px 0 8px}'
    +'table{width:100%;border-collapse:collapse;margin-bottom:14px}'
    +'thead th{background:#c8102e;color:#fff;padding:6px 8px;font-size:9.5px;text-align:right;font-weight:700}'
    +'tbody td{padding:5px 8px;border-bottom:1px solid #f1f5f9;font-size:10px}'
    +'.al-warn{background:#fee2e2;border:1px solid #fecaca;color:#dc2626;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:700;margin-bottom:8px}'
    +'.al-info{background:#f5f3ff;border:1px solid #ddd6fe;color:#7c3aed;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:700;margin-bottom:8px}'
    +'.footer{margin-top:18px;border-top:1px solid #e2e8f0;padding-top:10px;display:flex;justify-content:space-between;font-size:8.5px;color:#94a3b8}'
    +'@media print{button{display:none!important}@page{size:A4;margin:8mm}}'
    +'</style></head><body>'
    +'<div class="header">'
    +'<div><div class="logo">Cairo 3A Poultry</div><div class="sub">نظام إدارة إجازات الأسطول</div></div>'
    +'<div style="text-align:left"><div style="font-size:17px;font-weight:800">🚌 تقرير كفاءة الأسطول</div>'
    +'<div style="font-size:9px;color:#94a3b8;margin-top:3px">الفترة: '+fmt(frm||'—')+' → '+fmt(to)+' | الحد: '+limit+' نزلة | طُبع: '+fmt(tod())+'</div></div>'
    +'</div>'
    +'<div class="stats">'
    +'<div class="stat"><div class="sn" style="color:'+barColor+'">'+utilPct+'%</div><div class="sl">نسبة الإشغال</div></div>'
    +'<div class="stat"><div class="sn" style="color:#dc2626">'+EGP(Math.round(totalWastedCost))+'</div><div class="sl">تكلفة الهدر</div></div>'
    +'<div class="stat"><div class="sn" style="color:#7c3aed">'+dupRows2.length+'</div><div class="sl">حالة تداخل نقل</div></div>'
    +'<div class="stat"><div class="sn" style="color:#dc2626">'+overRows2.length+'</div><div class="sl">تجاوز الحد ('+limit+')</div></div>'
    +'</div>'
    +'<div style="margin-bottom:14px">'
    +'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">'
    +'<span style="font-weight:700">نسبة إشغال السيارات: '+totalOccupied+' من '+totalSeats+' مقعد</span>'
    +'<span style="font-weight:900;color:'+barColor+'">'+utilPct+'%</span></div>'
    +'<div class="bar-wrap"><div class="bar" style="width:'+utilPct+'%;background:'+barColor+'"></div></div>'
    +'</div>'
    +(vehicleRows.length
      ?'<div class="section-title">💸 رحلات بها مقاعد فارغة ('+vehicleRows.length+' رحلة)</div>'
      +'<table><thead><tr><th>خط السير</th><th>التاريخ</th><th>نوع السيارة</th><th>عدد السيارات</th><th>إجمالي مقاعد</th><th>الركاب</th><th>فارغة</th><th>تكلفة الهدر</th><th>% الإشغال</th></tr></thead><tbody>'
      +vehRows+'</tbody></table>'
      :'')
    +(dupRows2.length
      ?'<div class="al-info">⚠️ يوجد '+dupRows2.length+' موظف تم حجزهم بسيارة وتذكرة في نفس الفترة — إجمالي: '+EGP(dupTotalCost2)+'</div>'
      +'<div class="section-title">⚠️ تداخل السيارة والتذكرة</div>'
      +'<table><thead><tr><th>الكود</th><th>الموظف</th><th>خط السيارة</th><th>تاريخها</th><th>خط التذكرة</th><th>تاريخها</th><th>التكلفة</th></tr></thead><tbody>'
      +dupRowsHtml+'</tbody></table>'
      :'')
    +(overRows2.length
      ?'<div class="al-warn">🔴 يوجد '+overRows2.length+' موظف تجاوزوا حد '+limit+' نزلات — تكلفة الزيادة: '+EGP(overTotalCost2)+'</div>'
      +'<div class="section-title">🔴 تجاوز الحد الأقصى ('+limit+' نزلات)</div>'
      +'<table><thead><tr><th>الكود</th><th>الموظف</th><th>القطاع</th><th>عدد النزلات</th><th>الزيادة</th><th>تكلفة الزيادة</th></tr></thead><tbody>'
      +overRowsHtml+'</tbody></table>'
      :'')
    +'<div class="footer"><span>Cairo 3A Poultry</span><span>تقرير كفاءة الأسطول</span><span>'+fmt(tod())+'</span></div>'
    +'<div style="margin-top:14px;text-align:center">'
    +'<button onclick="window.print()" style="background:#c8102e;color:#fff;border:none;border-radius:8px;padding:10px 26px;font-size:13px;cursor:pointer;font-weight:700;margin-left:8px">🖨️ طباعة</button>'
    +'<button onclick="window.close()" style="background:#64748b;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;cursor:pointer;font-weight:700">✕ إغلاق</button>'
    +'</div></body></html>';

  var w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();}
}
function rTransfers(){
  var secOpts=S.sectors.map(function(s){return'<option value="'+s.id+'">'+s.ico+' '+s.name+'</option>';}).join('');
  return'<div class="fbar">'
    +'<div><label>من تاريخ</label><input type="date" id="trf-from" value="2025-01-01" onchange="bindTransfers()"/></div>'
    +'<div><label>إلى تاريخ</label><input type="date" id="trf-to" value="'+tod()+'" onchange="bindTransfers()"/></div>'
    +'<div><label>القطاع المحوّل إليه</label><select id="trf-sec" onchange="bindTransfers()"><option value="">كل القطاعات</option>'+secOpts+'</select></div>'
    +'<div style="margin-right:auto;display:flex;gap:8px"><button class="btn btn-r btn-sm" onclick="bindTransfers()">🔄 تحديث</button><button class="btn btn-xl btn-sm" onclick="exportTransfersXLSX()">📥 Excel</button><button class="btn btn-pr btn-sm" onclick="window.print()">🖨️ طباعة</button></div>'
    +'</div><div id="transfers-body"></div>';
}
function _trfDirCost(code,b,dir){
  var rtId=dir==='return'?(b.returnRouteId||b.routeId):b.routeId;
  var dt=dir==='return'?b.returnDate:b.departDate;
  var ct=S.trips.find(function(t){return(t.tripType||'depart')===dir&&(t.empCodes||[]).indexOf(String(code))>-1&&t.routeId===rtId&&t.departDate===dt;});
  if(ct)return +ct.costPerEmp||0;
  var tt=S.trips.find(function(t){return(t.tripType||'depart')===dir&&(t.ticketEmployees||[]).indexOf(String(code))>-1&&t.routeId===rtId&&t.departDate===dt;});
  if(tt)return +tt.ticketCostPerEmp||0;
  return 0;
}
function _trfData(){
  var frm=(document.getElementById('trf-from')||{}).value||'2025-01-01';
  var to=(document.getElementById('trf-to')||{}).value||tod();
  var secF=(document.getElementById('trf-sec')||{}).value||'';
  return S.bookings.filter(function(b){
    if(b.status==='rejected')return false;
    if(b.departDate<frm||b.departDate>to)return false;
    var em=gEmp(b.empCode);
    var depT=b.departCostSectorId&&b.departCostSectorId!==em.sectorId;
    var retT=b.returnCostSectorId&&b.returnCostSectorId!==em.sectorId;
    if(!depT&&!retT)return false;
    if(secF&&String(b.departCostSectorId)!==String(secF)&&String(b.returnCostSectorId)!==String(secF))return false;
    return true;
  }).map(function(b){
    var em=gEmp(b.empCode);
    var depSec=(b.departCostSectorId&&b.departCostSectorId!==em.sectorId)?b.departCostSectorId:0;
    var retSec=(b.returnCostSectorId&&b.returnCostSectorId!==em.sectorId)?b.returnCostSectorId:0;
    return{b:b,em:em,depSec:depSec,retSec:retSec,
      depCost:depSec?_trfDirCost(b.empCode,b,'depart'):0,
      retCost:retSec?_trfDirCost(b.empCode,b,'return'):0};
  }).sort(function(a,b){return a.b.departDate<b.b.departDate?1:-1;});
}
function bindTransfers(){
  var rows=_trfData();
  var empSet={};rows.forEach(function(r){empSet[r.b.empCode]=true;});
  var totalCost=rows.reduce(function(s,r){return s+r.depCost+r.retCost;},0);
  var depCount=rows.filter(function(r){return r.depSec;}).length;
  var retCount=rows.filter(function(r){return r.retSec;}).length;
  var h='<div class="g4" style="margin-bottom:16px">'
    +'<div class="stat"><div class="st-ico" style="background:#f5f3ff">🔀</div><div class="st-n" style="color:var(--purple)">'+rows.length+'</div><div class="st-l">حجوزات محوّلة</div></div>'
    +'<div class="stat"><div class="st-ico" style="background:#eff6ff">👥</div><div class="st-n" style="color:var(--blue)">'+Object.keys(empSet).length+'</div><div class="st-l">عدد الموظفين</div></div>'
    +'<div class="stat"><div class="st-ico" style="background:#fff1f2">📤📥</div><div class="st-n" style="color:var(--R)">'+depCount+' / '+retCount+'</div><div class="st-l">تحويلات نزول / عودة</div></div>'
    +'<div class="stat"><div class="st-ico" style="background:#f0fdf4">💰</div><div class="st-n" style="color:var(--green)">'+EGP(totalCost)+'</div><div class="st-l">إجمالي التكلفة المحوّلة</div></div>'
    +'</div>';
  h+='<div class="card"><div class="ch"><div><div class="ct">🔀 تفاصيل التحويلات</div><div class="cs">'+rows.length+' حجز</div></div></div>';
  if(!rows.length){h+='<div class="empty">لا توجد تحويلات في هذه الفترة</div>';}
  else{
    h+='<div class="tbl"><table><thead><tr><th>رقم الحجز</th><th>الموظف</th><th>القطاع الأساسي</th><th>تحويل النزول</th><th>تكلفة النزول</th><th>تحويل العودة</th><th>تكلفة العودة</th><th>التواريخ</th><th>مقدم الطلب</th></tr></thead><tbody>';
    rows.forEach(function(r){
      var b=r.b,em=r.em,homeSec=gSec(em.sectorId);
      var sub=b.submittedBy&&b.submittedBy!==b.empCode?b.submittedBy:'الموظف نفسه';
      h+='<tr>'
        +'<td><span style="font-family:monospace;color:var(--R);font-size:11px;font-weight:700">'+b.ref+'</span></td>'
        +'<td style="font-weight:700">'+(em.name||b.empCode)+'<div style="font-size:10px;color:var(--txt3)">'+b.empCode+'</div></td>'
        +'<td>'+sTag(em.sectorId)+'</td>'
        +'<td>'+(r.depSec?'<span class="badge b-pu">'+(homeSec.name||'')+' → '+(gSec(r.depSec).name||'')+'</span>':'<span style="color:var(--txt3)">—</span>')+'</td>'
        +'<td>'+(r.depSec?'<span class="chip">'+EGP(r.depCost)+'</span>':'—')+'</td>'
        +'<td>'+(r.retSec?'<span class="badge b-rt-change">'+(homeSec.name||'')+' → '+(gSec(r.retSec).name||'')+'</span>':'<span style="color:var(--txt3)">—</span>')+'</td>'
        +'<td>'+(r.retSec?'<span class="chip">'+EGP(r.retCost)+'</span>':'—')+'</td>'
        +'<td style="white-space:nowrap;font-size:11px">'+fmt(b.departDate)+' → '+fmt(b.returnDate)+'</td>'
        +'<td><span style="font-size:10px;color:var(--txt3)">'+sub+'</span></td>'
        +'</tr>';
    });
    h+='</tbody></table></div>';
  }
  h+='</div>';
  var el=document.getElementById('transfers-body');if(el)el.innerHTML=h;
}
function exportTransfersXLSX(){
  var rows=_trfData();
  var headers=['رقم الحجز','كود الموظف','اسم الموظف','القطاع الأساسي','تحويل النزول إلى','تكلفة النزول','تحويل العودة إلى','تكلفة العودة','تاريخ النزول','تاريخ العودة','مقدم الطلب'];
  var data=rows.map(function(r){
    var b=r.b,em=r.em;
    return[b.ref,b.empCode,em.name||'',gSec(em.sectorId).name||'',r.depSec?gSec(r.depSec).name||'':'—',r.depSec?r.depCost:0,r.retSec?gSec(r.retSec).name||'':'—',r.retSec?r.retCost:0,b.departDate,b.returnDate,(b.submittedBy&&b.submittedBy!==b.empCode?b.submittedBy:'الموظف نفسه')];
  });
  xlsxDirect('الموظفون_المحوّلون_'+tod(),headers,data);
}
